openapi: 3.1.0
info:
  title: Hoopoe Daemon API
  version: 0.1.0
  description: |
    Hoopoe daemon ↔ desktop contract per `plan.md §2.6`.

    Conventions (declared once here, applied across endpoints):

    - **Errors** use RFC 7807 `application/problem+json` (`#/components/schemas/Problem`).
    - **Idempotency** for retryable writes: clients pass `Idempotency-Key` (a stable
      ULID/UUID); the daemon dedupes within `IdempotencyKey.windowSeconds` and replays
      the original response on retry. Required on every non-GET that mutates state.
    - **Schema versions** every persisted entity declares `schemaVersion`. The daemon
      runs migrations at startup with backup + rollback (`plan.md §10.3`).
    - **Capability gating** every UI feature is gated on capability IDs reported by
      `/v1/capabilities` (§2.8). A capability that parses but cannot satisfy a
      contract test is `degraded`, not `ok`.
    - **WS events** the WebSocket envelope is documented as JSON Schema in
      `events/ws-envelope.schema.json` (sidecar; OpenAPI 3.1 cannot model the
      event-stream shape adequately).
    - **Source of truth** this spec is authoritative; both the TS client
      (`packages/schemas/ts/`) and the Go types (`packages/schemas/go/`) are
      generated from it. Hand-maintained duplicate shapes in `apps/desktop` or
      `apps/daemon` are forbidden (`plan.md §3 'Shared'`).
  license:
    name: UNLICENSED
servers:
  - url: http://127.0.0.1:0
    description: SSH-tunnel-forwarded local port (steady state)
  - url: http://127.0.0.1:8765
    description: Demo / Mock Flywheel Mode (development only)

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health, version, compatibility, capability gating.
  - name: Auth
    description: Pairing → bearer → WS-token chain (§5.2).
  - name: Events
    description: Replayable event stream (HTTP + SSE + WebSocket) with sequence cursors.
  - name: Jobs
    description: Long-running job registry (§2.7).
  - name: Bootstrap
    description: VPS onboarding wizard surfaces (§6).
  - name: Projects
    description: Project registry, activation, gate-readiness.
  - name: Git
    description: Read-mostly git surfaces; writes (push) are typed RPCs.
  - name: Plans
    description: Planning workspace artifacts.
  - name: Beads
    description: Beads view + conversion + polish runs (read via `br --json`).
  - name: Swarm
    description: NTM-backed swarm sessions, agent commands, pane streams.
  - name: Mail
    description: Agent Mail messages, threads, file reservations.
  - name: Health
    description: Code-health snapshots and per-file metrics.
  - name: Reviews
    description: Review rounds + finding ledger.
  - name: Tending
    description: Scheduled jobs (cron + interval + event + on-demand).
  - name: Approvals
    description: Approval queue (Hoopoe-policy + ingested DCG verdicts).

paths:
  /v1/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Liveness + readiness probe.
      description: |
        Used by the desktop FSM and by load balancers / SSH-tunnel keepalives.
        Always returns 200 if the daemon process can serve HTTP. Reports tool /
        adapter health *without* triggering full capability checks; for capability
        truth use `/v1/capabilities`.
      security: []
      responses:
        '200':
          description: Daemon is up.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/version:
    get:
      tags: [System]
      operationId: getVersion
      summary: Daemon build version, commit, and build metadata.
      description: |
        Reported in `compatibility` + included on every error envelope so a renderer
        can correlate failures with a specific binary. Includes signing/SBOM digests
        recorded at install time (`plan.md §11`).
      security: []
      responses:
        '200':
          description: Version info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VersionResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/compatibility:
    get:
      tags: [System]
      operationId: getCompatibility
      summary: Daemon API version, minimum desktop version, event schema versions, migration state.
      description: |
        Authoritative source for "can this desktop build talk to this daemon build."
        Returns `migrationState` so the desktop can refuse writes during a daemon
        migration (§10.3). Embeds a capability snapshot at the same point-in-time so
        clients can correlate API-version skew with capability availability without
        a second round-trip.
      security: []
      responses:
        '200':
          description: Compatibility info.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CompatibilityReport' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/capabilities:
    get:
      tags: [System]
      operationId: getCapabilities
      summary: Capability registry snapshot — every adapter, every capability ID.
      description: |
        Per `plan.md §2.8`: the desktop never assumes a feature exists because a tool
        is installed. UI buttons, stage routes, and tending jobs all gate on the IDs
        returned here. A `degraded` capability is rendered with its `fallback`
        explanation; a `missing` capability is rendered as unavailable + diagnostic.

        Adapter contract tests (§18.3) assert capabilities, not just parser success.
      parameters:
        - name: tool
          in: query
          required: false
          description: Filter to a single tool (e.g., `ntm`, `br`, `bv`).
          schema: { type: string }
      responses:
        '200':
          description: Capability snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CapabilityRegistry' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Projects (§4.1, §4.2) — read-mostly; activation flips canonical state.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/projects:
    get:
      tags: [Projects]
      operationId: listProjects
      summary: List projects this VPS hosts.
      parameters:
        - name: cursor
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Cursor' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Project list (paginated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectListResponse' }
        default: { $ref: '#/components/responses/Problem' }
    post:
      tags: [Projects]
      operationId: createProject
      summary: Import an existing VPS checkout into Hoopoe.
      description: |
        Registers a project rooted at an existing VPS Git checkout. Hoopoe v1
        requires an origin remote, initializes `.hoopoe/`, runs `br init` when
        `.beads/` is missing, records detected project tools, and returns the
        persisted project registry row.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectCreateRequest' }
      responses:
        '201':
          description: Project imported.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/projects/{projectId}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get a single project by ID.
      responses:
        '200':
          description: Project.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Project' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/projects/{projectId}/readiness:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
    get:
      tags: [Projects]
      operationId: getProjectReadiness
      summary: Gate-readiness state — which §4.2 invariants pass / fail.
      description: |
        Used by the stage chrome to gate Plan → Beads → Swarm → Hardening
        transitions. Each gate reports its individual checks so Diagnostics can
        explain "what's missing" without a separate round-trip.
      responses:
        '200':
          description: Readiness snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectReadiness' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Plans (§7.1) — read; create/lock land in subsequent commits.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/projects/{projectId}/plans:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
    get:
      tags: [Plans]
      operationId: listPlans
      summary: List plans for a project (locked + draft).
      parameters:
        - name: cursor
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Cursor' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Plan list (paginated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Beads — read via `br --json` adapter; mutations via /v1/beads/{id}.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/projects/{projectId}/beads:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
    get:
      tags: [Beads]
      operationId: listBeads
      summary: List beads for a project.
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by bead status (multi-value supported).
          explode: true
          schema:
            type: array
            items: { $ref: '#/components/schemas/BeadStatus' }
        - name: cursor
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Cursor' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        '200':
          description: Bead list (paginated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BeadListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/projects/{projectId}/beads/{beadId}:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - name: beadId
        in: path
        required: true
        description: Beads ID (e.g., `hp-r3i`).
        schema: { type: string, pattern: '^[a-z0-9-]+$' }
    get:
      tags: [Beads]
      operationId: getBead
      summary: Get a single bead, with edges.
      responses:
        '200':
          description: Bead.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Bead' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Jobs (§2.7) — long-running daemon work registry.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/jobs:
    get:
      tags: [Jobs]
      operationId: listJobs
      summary: List jobs (queued / running / waiting_approval / terminal).
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by job status (multi-value).
          explode: true
          schema:
            type: array
            items: { $ref: '#/components/schemas/JobStatus' }
        - name: projectId
          in: query
          required: false
          schema: { type: string }
        - name: cursor
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Cursor' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Job list (paginated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/jobs/{jobId}/cancel:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Jobs]
      operationId: cancelJob
      summary: Cancel a job (SIGTERM → grace → SIGKILL on the process group).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobCancelRequest' }
      responses:
        '202':
          description: Cancel acknowledged. Final state arrives via the job event channel.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Approvals (§5.3) — Hoopoe-policy + ingested DCG verdicts in one queue.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/projects/{projectId}/approvals:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
    get:
      tags: [Approvals]
      operationId: listApprovals
      summary: List pending + recently-decided approvals for a project.
      parameters:
        - name: state
          in: query
          required: false
          description: Filter by approval state.
          explode: true
          schema:
            type: array
            items: { $ref: '#/components/schemas/ApprovalState' }
        - name: cursor
          in: query
          required: false
          schema: { $ref: '#/components/schemas/Cursor' }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        '200':
          description: Approval list (paginated).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApprovalListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/projects/{projectId}/approvals/{approvalId}/approve:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - name: approvalId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Approvals]
      operationId: approveApproval
      summary: Approve a pending approval.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApprovalDecisionRequest' }
      responses:
        '200':
          description: Approval decided.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Events (§2.6) — replay stream for the WS reconnect path, plus the
  # SSE / WS connection paths. OpenAPI 3.x cannot fully describe a
  # bidirectional WebSocket or a streaming SSE response, so the
  # connection paths below carry summaries + auth requirements only and
  # link out to the JSON Schema sidecars that describe the wire frames:
  # `events/ws-envelope.schema.json` mirrors `components.WsEventEnvelope`
  # and is the source of truth for individual frames pushed over either
  # transport. hp-q1p closes the docs-drift gap that the connection
  # paths existed in router code but were absent from this contract.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/events/sse:
    get:
      tags: [Events]
      operationId: streamEventsSSE
      summary: Server-Sent Events stream for live event delivery.
      description: |
        Long-lived `text/event-stream` response that pushes the same
        event envelopes the WS path delivers. Each frame matches
        `components.WsEventEnvelope` (see `events/ws-envelope.schema.json`).
        Used as a fallback when WS is blocked by the network path.
        Reconnect via `/v1/events/replay` with the last sequence cursor
        from each channel — same `_gap` semantics as the WS path.
      parameters:
        - name: channels
          in: query
          required: true
          description: Comma-separated channel selectors.
          schema: { type: string, minLength: 1 }
        - name: cursors
          in: query
          required: false
          description: |
            Optional URL-encoded JSON map of `{channel: lastSequence}`
            for replay-on-connect.
          schema: { type: string }
      responses:
        '200':
          description: SSE stream opened.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Stream of `event: <type>\ndata: <json>\n\n` frames
                  whose `data` fields validate against
                  `components.WsEventEnvelope`.
        default: { $ref: '#/components/responses/Problem' }

  /v1/events/ws:
    get:
      tags: [Events]
      operationId: streamEventsWS
      summary: WebSocket upgrade for live bidirectional event delivery.
      description: |
        Upgrades to a WebSocket. Authentication is via the short-lived
        `wsToken` query parameter issued by `/v1/events/ws-token`. Each
        frame is a JSON-encoded `components.WsEventEnvelope` (see
        `events/ws-envelope.schema.json` for the standalone JSON Schema).
        OpenAPI 3.x cannot model the WebSocket protocol; this entry
        documents the URL, auth, and frame shape so the contract is
        not silently absent.
      parameters:
        - name: wsToken
          in: query
          required: true
          description: 5-minute WS token from `/v1/events/ws-token`.
          schema: { type: string, minLength: 1 }
      responses:
        '101':
          description: Switching Protocols (WebSocket upgrade).
        default: { $ref: '#/components/responses/Problem' }

  /v1/events/ws-token:
    get:
      tags: [Events]
      operationId: getEventsWSToken
      summary: Mint a 5-minute WS token from the bearer.
      description: |
        Convenience GET wrapper around `POST /v1/auth/ws-token` for the
        SSE→WS upgrade path. The bearer is supplied via the
        `Authorization: Bearer <token>` header.
      responses:
        '200':
          description: Issued WS token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedWSToken' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/events/replay:
    get:
      tags: [Events]
      operationId: replayEvents
      summary: Replay events from a sequence cursor for one channel.
      description: |
        Used by the desktop on reconnect (after laptop sleep, daemon
        restart, tunnel re-establishment, or a `_gap` notice on the WS).
        Returns events strictly after `sinceSequence` up to the daemon's
        retention horizon. Past the horizon, the desktop falls back to
        the persisted-log offset reported in the `_gap` notice.
      parameters:
        - name: channel
          in: query
          required: true
          description: Channel selector (e.g., `project:proj_01`).
          schema: { type: string, minLength: 1 }
        - name: sinceSequence
          in: query
          required: true
          description: Last-known sequence number; replay returns sequence > this.
          schema: { type: integer, minimum: 0 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
      responses:
        '200':
          description: Replayed event window.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EventReplayResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Auth (§5.2) — three-token bootstrap (pairing → bearer → ws-token)
  # plus session-revoke and rotate-secret. hp-q1p closes the docs-drift
  # gap that these paths were live in apps/daemon/internal/api/auth.go
  # but absent from this contract.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/auth/bootstrap/bearer:
    parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Auth]
      operationId: bootstrapBearer
      summary: Exchange a pairing token for a 30-day bearer.
      description: |
        Single-use consumption of a pairing token. Returns a bearer
        plus session metadata. The pairing token is destroyed on
        success; replay with the same token returns 410 Gone.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BootstrapBearerRequest' }
      responses:
        '200':
          description: Bearer issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedBearer' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/auth/ws-token:
    parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Auth]
      operationId: issueWSToken
      summary: Mint a 5-minute WS token from a valid bearer.
      description: |
        Bearer is supplied via the `Authorization: Bearer <token>`
        header. The returned WS token is single-use and binds to the
        same session.
      responses:
        '200':
          description: WS token issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/IssuedWSToken' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/auth/session/revoke:
    parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Auth]
      operationId: revokeSession
      summary: Revoke a session by sid (drops bearer + cascading WS).
      description: |
        Owner-only — caller's role is verified via the bearer in the
        `Authorization` header. Revocation is durable across daemon
        restart (per hp-b7rx). Idempotent over `sid`: revoking an
        already-revoked session returns 200 with `revoked: false`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SessionRevokeRequest' }
      responses:
        '200':
          description: Revoke result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionRevokeResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/auth/rotate-secret:
    parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Auth]
      operationId: rotateAuthSecret
      summary: Rotate the daemon's auth signing secret + re-pair owner.
      description: |
        Two-step write that rotates the JWT signing secret, revokes
        every active bearer/WS, and issues a single replacement owner
        pairing token whose plaintext is returned ONCE. Must be
        approved through the unified approvals queue first; the
        approval id is supplied via the `X-Hoopoe-Approval-ID` header
        and the explicit `X-Hoopoe-Confirm-Rotate: yes` confirmation.
        Surfaces `auth.secret_rotation_imminent` and
        `auth.secret_rotated` events on the `_system` channel.
      responses:
        '200':
          description: Rotation completed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RotateSecretResponse' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Tending (§8) — submit an ActionPlan; daemon validates + dry-runs +
  # enforces policy/approvals + executes + verifies postconditions.
  # ─────────────────────────────────────────────────────────────────────────

  /v1/projects/{projectId}/tending/actionplans:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Tending]
      operationId: submitActionPlan
      summary: Submit a typed ActionPlan from a tending agent (§8.3.1).
      description: |
        The daemon validates `actions[].kind` against the closed action set
        in `tending-actions.yaml`, evaluates policy + approval rules, and
        either accepts (returning a Job) or rejects with a `problem+json`
        whose `code` indicates the failure (e.g.,
        `tending.action_kind_unknown`, `approval.required`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActionPlan' }
      responses:
        '202':
          description: ActionPlan accepted; Job tracks execution.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Job' }
        default: { $ref: '#/components/responses/Problem' }

  # ─────────────────────────────────────────────────────────────────────────
  # Provider plugins (§6.2, §13) — abstract VPS provisioning catalog.
  # Daemon HTTP wrappers around the in-process `schemas.ProviderPlugin`
  # Go interface (registered via `init()` in plugin packages). v1 ships
  # with Contabo only (hp-9fo).
  # ─────────────────────────────────────────────────────────────────────────

  /v1/providers:
    get:
      tags: [Bootstrap]
      operationId: listProviders
      summary: List registered provider plugins (manifests).
      description: |
        Returns every plugin loaded into the running daemon binary. The
        wizard's "choose a provider" step renders from this list. Empty
        when no provider plugins are compiled in (existing-VPS first per
        Guardrail 6 — provider automation never blocks onboarding).
      responses:
        '200':
          description: Provider plugin list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/providers/{providerId}/regions:
    parameters:
      - name: providerId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ProviderId' }
    get:
      tags: [Bootstrap]
      operationId: listProviderRegions
      summary: List regions offered by a provider.
      responses:
        '200':
          description: Region list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderRegionListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/providers/{providerId}/regions/{regionId}/sizes:
    parameters:
      - name: providerId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ProviderId' }
      - name: regionId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Bootstrap]
      operationId: listProviderSizes
      summary: List instance sizes available in a region.
      responses:
        '200':
          description: Size list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderSizeListResponse' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/providers/{providerId}/cost-estimate:
    parameters:
      - name: providerId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ProviderId' }
    post:
      tags: [Bootstrap]
      operationId: estimateProviderMonthlyCost
      summary: Estimate monthly cost for a region/size combo (read-only POST).
      description: |
        Read-only despite being POST — uses POST to carry the request body
        cleanly. No `Idempotency-Key` required; cost estimates are pure
        functions of `(region, size, bandwidthTBExpected)` and the catalog
        version is recorded in the response.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProviderEstimateCostOpts' }
      responses:
        '200':
          description: Cost estimate.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderCostEstimate' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/providers/{providerId}/instances:
    parameters:
      - name: providerId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ProviderId' }
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Bootstrap]
      operationId: createProviderInstance
      summary: Provision a new VPS instance (audited as destructive — billable).
      description: |
        Creates a new VPS instance via the provider plugin. **Billable** —
        the renderer surfaces the cost estimate + destroy-flow before
        invoking. The audit log records actor, timestamp, full opts (with
        `sshPubKey` redacted to fingerprint), and the resulting
        `ProviderInstance`. Failure leaves no instance behind on the
        provider side (plugin contract requirement).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProviderCreateInstanceOpts' }
      responses:
        '202':
          description: |
            Provisioning accepted. Instance status is `provisioning` until
            it transitions to `running` via the provider's lifecycle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderInstance' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/providers/{providerId}/instances/{instanceId}:
    parameters:
      - name: providerId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ProviderId' }
      - name: instanceId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IdempotencyKey'
    delete:
      tags: [Bootstrap]
      operationId: destroyProviderInstance
      summary: Destroy a VPS instance (audited as destructive — irreversible).
      description: |
        Destroys the named instance via the provider plugin. **Irreversible
        and billable** (the provider may continue billing for the partial
        month). Triggers a Hoopoe-policy approval (`policy.provider.destroy`)
        before invoking the plugin. The audit log records actor,
        timestamp, plugin response notes.
      responses:
        '200':
          description: Instance destroyed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderDestroyResult' }
        default: { $ref: '#/components/responses/Problem' }

  /v1/projects/{projectId}/approvals/{approvalId}/deny:
    parameters:
      - $ref: '#/components/parameters/ProjectIdPath'
      - name: approvalId
        in: path
        required: true
        schema: { type: string }
      - $ref: '#/components/parameters/IdempotencyKey'
    post:
      tags: [Approvals]
      operationId: denyApproval
      summary: Deny a pending approval.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApprovalDecisionRequest' }
      responses:
        '200':
          description: Approval decided.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Approval' }
        default: { $ref: '#/components/responses/Problem' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC-signed session token (`plan.md §5.2`)
      description: |
        30-day bearer minted by exchanging a single-use pairing token at
        `/v1/auth/bootstrap/bearer`. Stored on the desktop via Electron
        `safeStorage.encryptString`. WebSocket connects use a 5-min `wsToken`
        from `/v1/auth/ws-token` instead.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Stable client-generated key (ULID/UUID) for safe retries. The daemon
        dedupes by key within a sliding window (default 24h) and replays the
        original status + body. Required on retryable writes; clients that omit
        it on a write that turns out to be retryable will receive a
        `precondition-failed` problem on the second attempt.
      schema:
        type: string
        minLength: 16
        maxLength: 128

    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Client-supplied request ID; echoed on responses + audit entries.
      schema:
        type: string
        minLength: 1
        maxLength: 128

    ProjectIdPath:
      name: projectId
      in: path
      required: true
      description: Project identifier (slug or ULID).
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: '^[A-Za-z0-9_\-]+$'

  responses:
    Problem:
      description: RFC 7807 problem+json error envelope.
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    # ─────────────────────────────────────────────────────────────────────────
    # Foundational shapes
    # ─────────────────────────────────────────────────────────────────────────

    Problem:
      type: object
      description: |
        RFC 7807 problem+json. `type` is a daemon-stable URN; `code` is a short
        machine-readable identifier (e.g., `auth.token_expired`,
        `capability.missing`). `instance` is a per-incident URI for support
        deep-links into Diagnostics.
      required: [type, title, status, code]
      properties:
        type:
          type: string
          format: uri-reference
          description: Stable problem-type URN (e.g., `urn:hoopoe:auth/token-expired`).
        title:
          type: string
          description: Short, human-readable summary.
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: Mirrors HTTP status.
        code:
          type: string
          description: Machine-readable error code (dot-separated namespace).
          pattern: '^[a-z][a-z0-9_]*(\.[a-z][a-z0-9_]*)*$'
        detail:
          type: string
          description: Human-readable explanation; redacted for sensitive fields.
        instance:
          type: string
          format: uri-reference
          description: Per-incident URI; `urn:hoopoe:incident:<id>` is canonical.
        requestId:
          type: string
          description: Echoes `X-Request-Id` if provided.
        correlationId:
          type: string
          description: Opaque correlation handle (matches audit-log entries).
        retryable:
          type: boolean
          description: True if the client may safely retry with the same Idempotency-Key.
        retryAfterSeconds:
          type: integer
          minimum: 0
          description: Optional hint for `Retry-After`.
        capability:
          type: string
          description: |
            For `capability.missing` / `capability.degraded` problems, the
            capability ID that the operation required.
        approvalId:
          type: string
          description: For `approval.required` problems, the queued approval ID.

    SchemaVersion:
      type: integer
      minimum: 1
      description: Monotonically increasing schema version for a persisted shape.

    Cursor:
      type: string
      description: |
        Opaque pagination cursor. Use the `next` cursor from a list response
        verbatim; do not parse it. Cursors are stable for ≥24h.

    PageMeta:
      type: object
      required: [hasMore]
      properties:
        hasMore: { type: boolean }
        next: { $ref: '#/components/schemas/Cursor' }
        total:
          type: integer
          description: Optional total count; expensive list endpoints omit this.

    Actor:
      type: object
      description: Who initiated an action — used in audit + event envelopes.
      required: [kind]
      properties:
        kind:
          type: string
          enum: [user, agent, scheduler, system, dcg, approval]
        id:
          type: string
          description: Stable identifier within the actor's namespace.
        displayName:
          type: string
          description: Optional UI-only label; never used for authorization.

    # ─────────────────────────────────────────────────────────────────────────
    # System endpoints
    # ─────────────────────────────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status, daemonId, time]
      properties:
        status:
          type: string
          enum: [ok, degraded, draining]
        daemonId:
          type: string
          description: Stable daemon instance ID; changes on reinstall.
        time:
          type: string
          format: date-time
        uptimeSeconds:
          type: integer
          minimum: 0
        adapters:
          type: object
          additionalProperties:
            type: string
            enum: [ok, degraded, missing, unknown]
          description: |
            Coarse per-tool adapter status (cheap; no full capability check).
            For authoritative capability gating call `/v1/capabilities`.

    VersionResponse:
      type: object
      required: [daemon, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        daemon:
          type: object
          required: [version]
          properties:
            version: { type: string, description: 'Semver of the daemon binary' }
            commit: { type: string, description: 'Git SHA of the build' }
            buildTime: { type: string, format: date-time }
            channel:
              type: string
              enum: [stable, nightly, dev]
            checksum:
              type: string
              description: 'Distribution checksum (matches release manifest)'
            sbomDigest:
              type: string
              description: 'SBOM digest recorded at install time (§11)'
            signingIdentity:
              type: string
              description: 'Signer identity (e.g., "Hoopoe v1 Release Key")'
            attestationUri:
              type: string
              format: uri-reference

    CompatibilityReport:
      type: object
      required: [schemaVersion, daemonApiVersion, minDesktopVersion, eventSchemaVersions, migrationState, capabilities]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        daemonApiVersion:
          type: string
          description: Semver of the OpenAPI contract this daemon implements.
        minDesktopVersion:
          type: string
          description: Minimum compatible desktop semver. Older desktops are warned.
        eventSchemaVersions:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
          description: Per-channel event schemaVersion (channel → schemaVersion int).
        migrationState:
          $ref: '#/components/schemas/MigrationState'
          description: |
            Structured migration state per §10.3. Desktop refuses write actions
            while `phase` is `running` or `failed`; shows read-only Diagnostics
            until `idle` is reported.
        unsupportedClientWarnings:
          type: array
          description: |
            Free-form human-readable warnings (e.g., "desktop 0.0.5 below
            minimum 0.1.0; please update"). Renderer surfaces these in the
            top-bar.
          items: { type: string }
        capabilities:
          $ref: '#/components/schemas/CapabilityRegistry'
          description: Capability snapshot at the same point-in-time.

    MigrationState:
      type: object
      description: |
        Structured daemon-migration state (§10.3). The renderer can pick the
        coarse `phase` enum for chrome state OR the detailed
        `schemaVersion`/`appliedAt`/`pending` fields for Diagnostics ("schema 7
        of 9 applied; pending: foo, bar"). Both stay consistent.
      required: [schemaVersion, appliedAt, pending]
      properties:
        schemaVersion:
          type: integer
          minimum: 0
          description: Currently applied schema version.
        appliedAt:
          type: string
          format: date-time
          description: When the most recent migration step finished.
        pending:
          type: array
          items: { type: string }
          description: Identifiers of unapplied migrations (empty in steady state).
        phase:
          type: string
          enum: [idle, running, failed, rolled_back]
          description: |
            Optional coarse phase. Always derivable from the structured fields
            (`pending == [] → idle` etc.); included so renderer chrome can pick
            it without computing.

    # ─────────────────────────────────────────────────────────────────────────
    # Capability registry (§2.8) — coordinated with hp-r33 (PANE 3)
    # ─────────────────────────────────────────────────────────────────────────

    ToolId:
      type: string
      description: |
        Closed enum of tools the capability registry knows about. New
        ecosystem health probes (e.g., `health_zig`) require an explicit
        spec bump per §10.3; the daemon-side checker uses a `health_*`
        prefix-match for forward-compat input validation.
      enum:
        - ntm
        - br
        - bv
        - agent_mail
        - git
        - ru
        - caam
        - caut
        - dcg
        - casr
        - pt
        - srp
        - sbh
        - ubs
        - jsm
        - jfp
        - oracle
        - rch
        - rano
        - health_ts
        - health_py
        - health_rs
        - health_go
        - health_generic

    CapabilityStatus:
      type: string
      description: |
        - `ok` — capability satisfied a contract test.
        - `degraded` — works via fallback transport / partial output.
        - `missing` — tool reports the capability is absent.
        - `blocked-by-policy` — present but disallowed by config.
        - `untested` — daemon could not probe in this snapshot; renderer
          buckets with `missing` (unavailable) but Diagnostics distinguishes
          the two.
      enum: [ok, degraded, missing, blocked-by-policy, untested]

    Capability:
      type: object
      description: |
        One capability slot inside a `ToolReport`. The map key is the
        capability ID (e.g., `ntm.sessions.list`); the value is this object.
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/CapabilityStatus' }
        fallback:
          type: string
          description: |
            Human-readable fallback strategy when status != `ok`. Example:
            `"tmux capture last"` for `ntm.panes.stream` missing.
        transport:
          type: string
          enum: [websocket, sse, http, stdio, fixture]
          description: Transport actually being used for this capability when applicable.
        notes:
          type: string
          description: |
            Adapter free-text. Surfaced in Diagnostics. Not redacted at the
            field name (redaction happens at the audit/log boundary, hp-je1p);
            do not put secrets here.

    ToolReport:
      type: object
      description: |
        One tool's slice of the capability registry. Compose into
        `CapabilityRegistry.tools` keyed by ToolId.
      required: [tool, version, source, capabilities, lastCheckedAt, fixturesVersion]
      properties:
        tool: { $ref: '#/components/schemas/ToolId' }
        version:
          type: string
          description: Semver (or vendor version string) of the tool. Empty if unknown.
        source:
          type: string
          description: |
            How capabilities were detected. Examples: `"ntm serve"`,
            `"--robot-* JSON"`, `"CLI"`, `"fixture"`.
        capabilities:
          type: object
          additionalProperties: { $ref: '#/components/schemas/Capability' }
          description: |
            Map of capability ID → capability slot. Capability IDs are dotted
            namespaces (e.g., `ntm.sessions.list`, `bv.robot.triage`). The full
            list of recognised capability IDs is owned by hp-r33.
        lastCheckedAt: { type: string, format: date-time }
        fixturesVersion:
          type: string
          description: Phase 0 fixture tag this registry was validated against.

    DegradedModePolicy:
      type: object
      description: |
        Per-feature / per-tending-job degraded-mode contract (§2.8, §8.2). Used
        to decide whether to block, run read-only, or warn when a required
        capability is missing. Field names are camelCase (matching the rest of
        the spec); enum values are snake_case (they are tokens, not keys).
      required: [ifMissingRequired, ifMissingOptional, activityBehavior]
      properties:
        ifMissingRequired:
          type: string
          enum: [block_job, run_read_only, emit_diagnostic]
        ifMissingOptional:
          type: string
          enum: [continue_with_warning, suppress_related_detections]
        activityBehavior:
          type: string
          enum: [silent, diagnostics_only, activity_panel_warning]

    CapabilityRegistry:
      type: object
      description: |
        Authoritative capability snapshot returned by `/v1/capabilities`. The
        `tools` map is keyed by ToolId so renderer code can do
        `registry.tools.git.capabilities['git.push']` in O(1) without scanning
        an array.
      required: [schemaVersion, snapshotAt, daemonApiVersion, fixturesVersion, tools]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        snapshotAt:
          type: string
          format: date-time
          description: When this composite was assembled (single timestamp across all tools).
        daemonApiVersion:
          type: string
          description: Cross-reference with `/v1/compatibility.daemonApiVersion`.
        fixturesVersion:
          type: string
          description: |
            Dominant fixtures tag for the snapshot. Per-tool tags can diverge
            (each `ToolReport.fixturesVersion` is authoritative for that tool);
            this is the most-common tag, used for top-level Diagnostics labels.
        tools:
          type: object
          description: |
            Map of ToolId → ToolReport. OpenAPI cannot fully constrain object
            keys to a closed enum; the daemon enforces `ToolId` membership at
            serialization. Missing tools are absent from the map (not present
            with `null`).
          additionalProperties: { $ref: '#/components/schemas/ToolReport' }
          propertyNames:
            $ref: '#/components/schemas/ToolId'

    # ─────────────────────────────────────────────────────────────────────────
    # VPS + Project domain (§4.1, §4.2, §6)
    # ─────────────────────────────────────────────────────────────────────────

    VpsLifecycleState:
      type: string
      enum: [unconfigured, ssh_verified, daemon_running, tools_installed, ready]

    VpsHost:
      type: object
      description: |
        The single VPS this Hoopoe install pairs with (per ADR-0001 v1).
      required: [id, lifecycleState, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string, description: 'Stable VPS identifier (ULID).' }
        hostname: { type: string }
        ipAddress: { type: string }
        sshUser: { type: string }
        lifecycleState: { $ref: '#/components/schemas/VpsLifecycleState' }
        firstConnectedAt: { type: string, format: date-time }
        lastReachableAt: { type: string, format: date-time }
        toolVersionsRecordedAt: { type: string, format: date-time }
        notes: { type: string }

    ProjectLifecycleState:
      type: string
      enum:
        - imported
        - planning
        - plan_finalized
        - beads_created
        - beads_finalized
        - swarm_running
        - hardening_rounds
        - quality_gates
        - completed

    ProjectRepoRef:
      type: object
      required: [origin, branch]
      properties:
        origin:
          type: string
          description: |
            Origin URL of the canonical Git remote (e.g.,
            `git@github.com:user/repo.git`). NEVER the VPS path; the VPS clone
            and desktop mirror are sync targets.
        branch: { type: string, description: 'Default branch the project tracks.' }
        vpsClonePath:
          type: string
          description: 'Working clone path on the VPS (`/data/projects/<project>/`).'
        desktopMirrorPath:
          type: string
          description: 'Read-only sync mirror path on the desktop (§7.7).'
        lastFetchedAt: { type: string, format: date-time }

    ProjectCreateRequest:
      type: object
      description: |
        Request body for importing an existing project checkout into the daemon
        registry. `Idempotency-Key` is supplied as an HTTP header, not in this
        JSON body.
      required: [rootPath]
      properties:
        id:
          type: string
          description: 'Optional stable project ID override; omitted values are daemon-generated.'
        name:
          type: string
          description: 'Optional display name; defaults to the project root basename.'
        slug:
          type: string
          description: 'Optional route-safe slug; defaults to a slugified name.'
        rootPath:
          type: string
          description: 'Absolute path to an existing VPS Git checkout.'
        vpsId:
          type: string
          description: 'Optional VPS host ID; defaults to the local daemon host.'
        desktopMirrorPath:
          type: string
          description: 'Read-only desktop sync mirror path once the desktop clone is created.'
        allowNoLanguageManifest:
          type: boolean
          description: 'Permit documentation-only repos without package manifests during readiness checks.'

    Project:
      type: object
      description: |
        One project on this VPS. Lifecycle states + gate invariants are
        canonical (§4); the daemon never lets a stage flip until the gate
        invariants pass.
      required: [id, slug, name, vpsId, repo, lifecycleState, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        slug:
          type: string
          description: 'URL-safe project slug (used in routes + Activity panel).'
        name: { type: string, description: 'Human-readable project name.' }
        vpsId: { type: string, description: 'ID of the VpsHost hosting this project.' }
        repo: { $ref: '#/components/schemas/ProjectRepoRef' }
        lifecycleState: { $ref: '#/components/schemas/ProjectLifecycleState' }
        agentsManifestPresent:
          type: boolean
          description: 'Whether AGENTS.md was found on import.'
        agentsContract:
          $ref: '#/components/schemas/ProjectAgentContract'
        hoopoeInitialized:
          type: boolean
          description: 'Whether the project has a populated `.hoopoe/` directory.'
        toolDetectionDone: { type: boolean }
        importedAt: { type: string, format: date-time }
        lastActivityAt: { type: string, format: date-time }

    ProjectAgentContract:
      type: object
      description: |
        Per-project agent operating contract status. The daemon surfaces this
        on import and readiness checks so swarm launch can require agents to
        reread the project's own instructions before work starts (§7.3, §15).
      required: [status, defaultRelativePath, readRequiredBeforeSwarm]
      properties:
        status:
          type: string
          enum: [present, missing]
        relativePath:
          type: string
          description: 'Repo-relative path to the detected AGENTS.md file when present.'
        defaultRelativePath:
          type: string
          description: 'Repo-relative path used by the create action when AGENTS.md is missing.'
        readRequiredBeforeSwarm:
          type: boolean
          description: 'True when swarm kickoff must instruct agents to reread this contract.'
        openAction:
          $ref: '#/components/schemas/ProjectAgentContractAction'
        createAction:
          $ref: '#/components/schemas/ProjectAgentContractCreateAction'

    ProjectAgentContractAction:
      type: object
      required: [id, label, targetRelativePath]
      properties:
        id:
          type: string
          enum: [agents.open]
        label: { type: string }
        targetRelativePath: { type: string }

    ProjectAgentContractCreateAction:
      type: object
      required: [id, label, targetRelativePath, template, templateSha256]
      properties:
        id:
          type: string
          enum: [agents.create]
        label: { type: string }
        targetRelativePath: { type: string }
        template:
          type: string
          description: 'Editable recommended AGENTS.md template body.'
        templateSha256:
          type: string
          description: 'SHA-256 of the provided template for audit/debug drift checks.'

    ProjectListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Project' }
        page: { $ref: '#/components/schemas/PageMeta' }

    ProjectGate:
      type: string
      description: |
        Named gate per §4.2. Used to key `ProjectReadiness.gates`.
      enum:
        - vps_ready
        - project_imported
        - plan_locked
        - beads_created
        - beads_finalized
        - launch_ready
        - hardening_ready
        - ship_ready

    GateCheck:
      type: object
      description: |
        One named precondition for a gate. `ok` when satisfied; otherwise
        `detail` explains what's missing in human-readable form.
      required: [id, ok]
      properties:
        id: { type: string, description: 'Stable check ID, e.g., `agents_md_present`.' }
        ok: { type: boolean }
        detail: { type: string }

    ProjectReadinessGate:
      type: object
      required: [gate, satisfied, checks]
      properties:
        gate: { $ref: '#/components/schemas/ProjectGate' }
        satisfied:
          type: boolean
          description: 'True iff all `checks` pass.'
        checks:
          type: array
          items: { $ref: '#/components/schemas/GateCheck' }
        blockingCount: { type: integer, minimum: 0 }

    ProjectReadiness:
      type: object
      description: |
        Composite readiness snapshot per §4.2. `gates` is keyed in canonical
        order; the desktop renders them as a checklist with the first failing
        gate highlighted.
      required: [projectId, schemaVersion, gates, checkedAt]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        projectId: { type: string }
        currentLifecycleState: { $ref: '#/components/schemas/ProjectLifecycleState' }
        gates:
          type: array
          items: { $ref: '#/components/schemas/ProjectReadinessGate' }
        checkedAt: { type: string, format: date-time }

    # ─────────────────────────────────────────────────────────────────────────
    # Plans (§7.1)
    # ─────────────────────────────────────────────────────────────────────────

    PlanLifecycleState:
      type: string
      enum: [draft, refining, locked, archived]

    PlanQualityScore:
      type: object
      description: |
        Composite quality score for a plan (`§7.1`). Each dimension scored
        0–10; scoring rubric in `docs/planning/quality-rubric.md` (TBD).
      required: [overall, dimensions, scoredAt]
      properties:
        overall: { type: number, minimum: 0, maximum: 10 }
        dimensions:
          type: object
          additionalProperties:
            type: number
            minimum: 0
            maximum: 10
          description: 'Per-dimension scores (e.g., `clarity`, `coverage`, `risk_surfacing`).'
        scoredAt: { type: string, format: date-time }
        scorerActor: { $ref: '#/components/schemas/Actor' }

    Plan:
      type: object
      description: |
        A planning artifact for a project. Stored as markdown under
        `.hoopoe/plans/<plan-id>/` in the project repo.
      required: [id, projectId, schemaVersion, state, createdAt]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        projectId: { type: string }
        title: { type: string }
        state: { $ref: '#/components/schemas/PlanLifecycleState' }
        roundCount:
          type: integer
          minimum: 0
          description: 'Number of refinement rounds completed.'
        latestQuality:
          $ref: '#/components/schemas/PlanQualityScore'
        createdAt: { type: string, format: date-time }
        lockedAt: { type: string, format: date-time }
        artifactsRef:
          type: string
          description: |
            Pointer to the artifact bundle (audit log, model raws, traces).
            Resolves through the daemon's artifact registry.

    PlanListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Plan' }
        page: { $ref: '#/components/schemas/PageMeta' }

    # ─────────────────────────────────────────────────────────────────────────
    # Beads (read via `br --robot-*` adapter)
    # ─────────────────────────────────────────────────────────────────────────

    BeadStatus:
      type: string
      enum: [open, in_progress, blocked, closed, deleted]

    BeadIssueType:
      type: string
      enum: [task, bug, feature, epic, question, docs]

    BeadPriority:
      type: integer
      description: '0=critical, 1=high, 2=medium, 3=low, 4=backlog.'
      minimum: 0
      maximum: 4

    BeadDependencyEdge:
      type: object
      required: [id, dependencyType]
      properties:
        id: { type: string, description: 'The other bead ID.' }
        title: { type: string, description: 'Cached title for UI without round-trip.' }
        dependencyType:
          type: string
          enum: [blocks, parent, related]
        status: { $ref: '#/components/schemas/BeadStatus' }
        priority: { $ref: '#/components/schemas/BeadPriority' }

    Bead:
      type: object
      description: |
        One bead from `br`. Edges are cached snapshots; the canonical edge
        truth lives in `.beads/issues.jsonl`.
      required: [id, title, status, priority, issueType, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string, description: 'Beads ID, e.g., `hp-r3i`.' }
        title: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/BeadStatus' }
        priority: { $ref: '#/components/schemas/BeadPriority' }
        issueType: { $ref: '#/components/schemas/BeadIssueType' }
        sourceRepo: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        createdBy: { type: string }
        dependencies:
          type: array
          items: { $ref: '#/components/schemas/BeadDependencyEdge' }
        dependents:
          type: array
          items: { $ref: '#/components/schemas/BeadDependencyEdge' }

    BeadListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Bead' }
        page: { $ref: '#/components/schemas/PageMeta' }

    BeadSetQuality:
      type: object
      description: |
        Composite quality score for a set of beads (post-conversion / polish
        rounds). Per `§7.2`.
      required: [overall, scoredAt]
      properties:
        overall: { type: number, minimum: 0, maximum: 10 }
        coverage:
          type: number
          minimum: 0
          maximum: 1
          description: 'Plan-to-bead coverage ratio.'
        clarityAvg: { type: number, minimum: 0, maximum: 10 }
        testabilityAvg: { type: number, minimum: 0, maximum: 10 }
        readyFrontierSize: { type: integer, minimum: 0 }
        scoredAt: { type: string, format: date-time }

    # ─────────────────────────────────────────────────────────────────────────
    # Jobs (§2.7) + ArtifactRef
    # ─────────────────────────────────────────────────────────────────────────

    JobStatus:
      type: string
      enum: [queued, running, waiting_approval, canceling, succeeded, failed, interrupted]

    ArtifactRef:
      type: object
      description: |
        Stable handle to a daemon-managed artifact (logs, plan outputs,
        conversion traces, health snapshots, review findings, bootstrap
        logs). Resolved via the artifact registry on demand.
      required: [id, kind]
      properties:
        id: { type: string }
        kind:
          type: string
          enum:
            - log
            - plan_artifact
            - conversion_trace
            - health_snapshot
            - review_finding
            - bootstrap_log
            - misc
        sizeBytes: { type: integer, minimum: 0 }
        contentType: { type: string }
        sha256: { type: string }
        createdAt: { type: string, format: date-time }

    Job:
      type: object
      description: |
        One long-running job in the daemon's registry (§2.7). `argvDigest`
        and `envDigest` are blake3 hashes — full argv/env are recorded in the
        artifact registry, redacted on the way out.
      required: [id, type, status, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string, description: 'Sortable ULID for the job.' }
        type:
          type: string
          description: |
            Job kind (e.g., `bootstrap.acfs`, `plan.candidate.generate`,
            `swarm.spawn`, `health.snapshot`, `tend.swarm`,
            `build.run`, `test.run`).
        status: { $ref: '#/components/schemas/JobStatus' }
        projectId: { type: string }
        actor: { $ref: '#/components/schemas/Actor' }
        argvDigest: { type: string, description: 'Hash of the normalized argv.' }
        envDigest: { type: string, description: 'Hash of the relevant env keys.' }
        cwd: { type: string }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        durationMs: { type: integer, minimum: 0 }
        exitCode: { type: integer }
        failureFingerprint:
          type: string
          description: |
            Stable hash of the failure signature (test name, stack frames),
            used to detect repeated failures across reruns (§2.7).
        artifacts:
          type: array
          items: { $ref: '#/components/schemas/ArtifactRef' }
        approvalId:
          type: string
          description: 'Set when status is `waiting_approval`.'

    JobListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Job' }
        page: { $ref: '#/components/schemas/PageMeta' }

    JobCancelRequest:
      type: object
      properties:
        reason: { type: string, description: 'Optional human-readable note.' }
        graceSeconds:
          type: integer
          minimum: 0
          maximum: 60
          default: 5
          description: 'SIGTERM → SIGKILL escalation window.'

    # ─────────────────────────────────────────────────────────────────────────
    # CommandSpec + Approval (§5.3)
    # ─────────────────────────────────────────────────────────────────────────

    CommandSpec:
      type: object
      description: |
        Typed representation of an action the daemon would execute (or has
        executed). Used by Approval, Job audit, and tending ActionPlans
        (`packages/schemas/tending-actions.yaml`). The daemon — not the model
        or renderer — is the executor.
      required: [kind, target]
      properties:
        kind:
          type: string
          description: |
            Action kind. The closed set lives in `tending-actions.yaml`;
            examples include `git.push_branch`, `agent.send_marching_orders`,
            `reservation.force_release`, `caam.switch_account`.
        target:
          type: object
          description: |
            Action-specific target keys (e.g., `{agentId}`, `{branch}`,
            `{reservationId}`). Schema is per-action; the daemon validates
            against the action's published shape.
          additionalProperties: true
        args:
          type: object
          description: 'Action-specific args; opaque at this layer.'
          additionalProperties: true
        idempotencyKey:
          type: string
          description: 'Stable key used to dedupe repeated executions.'
        preconditions:
          type: array
          items: { type: string }
          description: 'Human-readable preconditions verified before execution.'
        postconditions:
          type: array
          items: { type: string }
          description: 'Human-readable postconditions verified after execution.'

    ApprovalRiskClass:
      type: string
      enum: [low, medium, high, critical]

    ApprovalScope:
      type: string
      description: |
        How wide the approval applies. `once` only authorizes the requested
        execution; `this_bead` applies to identical kind+target within the
        bead; etc.
      enum: [once, this_bead, this_swarm, this_project_session]

    ApprovalState:
      type: string
      enum: [pending, approved, denied, expired, revoked]

    ApprovalSource:
      type: string
      description: |
        Where the approval originated — Hoopoe-policy approvals from the
        daemon, or DCG verdicts ingested via the agent boundary (§5.3).
      enum: [hoopoe_policy, dcg]

    ApprovalDecisionRequest:
      type: object
      required: [decisionActor]
      properties:
        decisionActor: { $ref: '#/components/schemas/Actor' }
        note: { type: string }
        scope: { $ref: '#/components/schemas/ApprovalScope' }

    Approval:
      type: object
      description: |
        Durable approval record (§5.3). Approvals live in one queue regardless
        of source; the renderer surfaces both Hoopoe-policy and DCG-ingested
        approvals with their `source` rule attached.
      required: [id, schemaVersion, state, source, requestedAction, requestActor, riskClass, scope, requestedAt]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        projectId: { type: string }
        beadId: { type: string }
        swarmId: { type: string }
        agentId: { type: string }
        state: { $ref: '#/components/schemas/ApprovalState' }
        source: { $ref: '#/components/schemas/ApprovalSource' }
        requestedAction: { $ref: '#/components/schemas/CommandSpec' }
        requestActor:
          $ref: '#/components/schemas/Actor'
          description: 'Who requested the approval (user, agent, tending job).'
        reason: { type: string }
        evidenceRefs:
          type: array
          items: { type: string }
          description: |
            Opaque IDs pointing into audit log / pane logs / detection records.
            Resolved client-side via the artifact registry on click.
        riskClass: { $ref: '#/components/schemas/ApprovalRiskClass' }
        scope: { $ref: '#/components/schemas/ApprovalScope' }
        policyRule:
          type: string
          description: |
            The Hoopoe policy ID or DCG rule ID that required this approval.
            Surfaced in Diagnostics so the user knows WHY they're being asked.
        requestedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        decidedAt: { type: string, format: date-time }
        decisionActor:
          $ref: '#/components/schemas/Actor'
          description: 'Set when state ≠ pending.'
        decisionNote: { type: string }

    ApprovalListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Approval' }
        page: { $ref: '#/components/schemas/PageMeta' }

    # ─────────────────────────────────────────────────────────────────────────
    # WebSocket event stream (§2.6) — envelope + subscribe + system events.
    # ─────────────────────────────────────────────────────────────────────────
    #
    # OpenAPI 3.x cannot model bidirectional WebSocket streams adequately, so
    # the wire format is described as schemas and a JSON-Schema sidecar at
    # `events/ws-envelope.schema.json` mirrors the same shapes for consumers
    # that want a non-OpenAPI source. The actual event types per channel
    # are an open set; the daemon publishes a registry at runtime.

    WsSubscribeOp:
      type: object
      description: |
        Client → daemon. Subscribe to one or more channels with optional
        per-channel cursors (last-seen sequence). The daemon replays from
        the cursor (subject to retention) before streaming live events.
      required: [op, channels]
      properties:
        op:
          type: string
          const: subscribe
        channels:
          type: array
          items: { type: string }
          description: |
            Channel selectors, e.g., `project:proj_01`, `swarm:sw_01`,
            `activity:proj_01`, `_system`.
        cursors:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          description: |
            Map of channel → last-known sequence number. Daemon resumes after
            (cursor + 1). Channels absent from the map start from "live now."

    WsUnsubscribeOp:
      type: object
      required: [op, channels]
      properties:
        op:
          type: string
          const: unsubscribe
        channels:
          type: array
          items: { type: string }

    WsClientOp:
      description: 'Discriminated union of client → daemon op messages.'
      oneOf:
        - $ref: '#/components/schemas/WsSubscribeOp'
        - $ref: '#/components/schemas/WsUnsubscribeOp'
      discriminator:
        propertyName: op
        mapping:
          subscribe: '#/components/schemas/WsSubscribeOp'
          unsubscribe: '#/components/schemas/WsUnsubscribeOp'

    WsEventEnvelope:
      type: object
      description: |
        Daemon → client envelope for every project / swarm / activity event.
        `sequence` is monotonic per `channel`; clients persist the last seen
        and pass it back on reconnect for replay.
      required: [eventId, schemaVersion, channel, type, sequence, time]
      properties:
        eventId: { type: string, description: 'ULID for the event.' }
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        channel:
          type: string
          description: 'e.g., `project:proj_01`, `swarm:sw_01`.'
        type:
          type: string
          description: |
            Channel-scoped event type (e.g., `bead.changed`, `agent.idle`,
            `job.status.changed`). The daemon publishes the per-channel
            registry; clients tolerate unknown types (forward-compat).
        sequence:
          type: integer
          minimum: 0
          description: 'Monotonic per channel.'
        time: { type: string, format: date-time }
        actor: { $ref: '#/components/schemas/Actor' }
        causationId:
          type: string
          description: 'ID of the command/action that caused this event.'
        correlationId:
          type: string
          description: 'Cross-event handle (e.g., swarm session ID).'
        data:
          description: |
            Event-type-specific payload. Schema per `type`; consumers should
            switch on `type` and validate against the published per-type schema.
            Unknown types should not fail-closed (forward-compat).

    WsHeartbeat:
      type: object
      description: |
        Daemon-emitted liveness ping on the `_system` channel. Clients use
        this to detect tunnel/transport stalls.
      required: [channel, type, sequence, time]
      properties:
        channel:
          type: string
          const: _system
        type:
          type: string
          const: heartbeat
        sequence:
          type: integer
          minimum: 0
        time: { type: string, format: date-time }

    WsGap:
      type: object
      description: |
        Daemon-emitted gap notice when a slow client falls past the in-memory
        ring. Includes a persisted-log offset hint so the client fetches the
        missing range from disk via `GET /v1/events/replay`.
      required: [channel, type, from, to, repair]
      properties:
        channel: { type: string }
        type:
          type: string
          const: _gap
        from: { type: integer, minimum: 0 }
        to: { type: integer, minimum: 0 }
        repair:
          type: string
          enum: [replayEvents]

    WsLag:
      type: object
      description: |
        Soft-lag warning emitted before a `_gap`. Allows clients to drain
        their queue before the daemon escalates to a gap notice.
      required: [channel, type, sequence, time]
      properties:
        channel: { type: string }
        type:
          type: string
          const: _lag
        sequence: { type: integer, minimum: 0 }
        time: { type: string, format: date-time }

    WsServerMessage:
      description: 'Discriminated union of daemon → client messages.'
      oneOf:
        - $ref: '#/components/schemas/WsEventEnvelope'
        - $ref: '#/components/schemas/WsHeartbeat'
        - $ref: '#/components/schemas/WsGap'
        - $ref: '#/components/schemas/WsLag'

    # ─────────────────────────────────────────────────────────────────────────
    # Auth (§5.2) request/response schemas — hp-q1p adds the four POST
    # endpoints' shapes to close the docs-drift gap. Field shapes mirror
    # apps/daemon/internal/api/auth.go and apps/daemon/internal/auth.
    # ─────────────────────────────────────────────────────────────────────────

    BootstrapBearerRequest:
      type: object
      required: [pairingToken, instanceId]
      properties:
        pairingToken:
          type: string
          minLength: 1
          description: Single-use pairing token issued via `hoopoe pair create`.
        instanceId:
          type: string
          minLength: 1
          description: |
            Human-stable identifier for this client install (e.g.,
            macOS hardware UUID hash). Recorded on the resulting
            session for audit and revocation.

    IssuedBearer:
      type: object
      required: [bearerToken, sid, role, expiresAt]
      properties:
        bearerToken: { type: string, minLength: 1 }
        sid:
          type: string
          minLength: 1
          description: Session id; durable across daemon restart per hp-b7rx.
        role:
          type: string
          enum: [owner, client]
        expiresAt:
          type: string
          format: date-time

    IssuedWSToken:
      type: object
      required: [wsToken, expiresAt]
      properties:
        wsToken: { type: string, minLength: 1 }
        expiresAt:
          type: string
          format: date-time

    SessionRevokeRequest:
      type: object
      required: [sid]
      properties:
        sid: { type: string, minLength: 1 }

    SessionRevokeResponse:
      type: object
      required: [sid, revoked]
      properties:
        sid: { type: string }
        revoked:
          type: boolean
          description: |
            False iff the sid was already revoked or unknown — the
            handler is idempotent over `sid`.

    RotateSecretResponse:
      type: object
      required: [secretGeneration, replacementPairingToken, rotatedAt, revoked]
      properties:
        secretGeneration:
          type: integer
          minimum: 1
          description: |
            Monotonic counter of how many times the signing secret has
            rotated since installation. Bearers signed under prior
            generations fail with `auth.bearer_invalid_signature`.
        replacementPairingToken:
          type: string
          minLength: 1
          description: |
            One-time replacement owner pairing token. Returned once;
            the daemon does not retain the plaintext.
        rotatedAt:
          type: string
          format: date-time
        revoked:
          type: object
          required: [bearers, pairingGrants]
          properties:
            bearers:
              type: integer
              minimum: 0
              description: Number of active bearer sessions revoked by the rotation.
            pairingGrants:
              type: integer
              minimum: 0
              description: Number of un-consumed pairing tokens revoked.

    EventReplayResponse:
      type: object
      required: [channel, events, latestSequence]
      properties:
        channel: { type: string }
        events:
          type: array
          items: { $ref: '#/components/schemas/WsEventEnvelope' }
        latestSequence:
          type: integer
          minimum: 0
          description: 'Highest sequence currently retained for this channel.'
        retentionHorizon:
          type: integer
          minimum: 0
          description: |
            Lowest sequence still available via replay. Sequences below this
            are reachable only via the persisted-log offset on disk.
        truncated:
          type: boolean
          description: 'True iff `limit` capped the result (more events available).'

    # ─────────────────────────────────────────────────────────────────────────
    # ActionPlan (§8.3.1) — typed agent action surface, mirrored to
    # `tending-actions.yaml`. The closed `kind` set is canonical there;
    # CommandSpec.kind is open by design (other callers may add new kinds).
    # ─────────────────────────────────────────────────────────────────────────

    ActionKind:
      type: string
      description: |
        Closed enum of allowed tending action types per §8.3.1. Mirrored in
        `tending-actions.yaml`; the daemon rejects any ActionPlan whose
        action `kind` is outside this set. Adding a new kind is a deliberate
        spec bump that lands in both places.
      enum:
        - agent.ask_status
        - agent.send_marching_orders
        - agent.pause
        - agent.kill_wedged_process
        - reservation.force_release
        - caam.switch_account
        - casr.resume_session
        - git.push_branch
        - swarm.halt
        - review.propose_flip
        - bead.create_blocker

    ActionRiskClass:
      $ref: '#/components/schemas/ApprovalRiskClass'

    Action:
      type: object
      description: |
        One typed action inside an ActionPlan. The `kind` is closed; `target`
        and `args` shapes are per-kind (validated by the daemon against the
        action's published schema in tending-actions.yaml).
      required: [kind, target, idempotencyKey]
      properties:
        kind: { $ref: '#/components/schemas/ActionKind' }
        target:
          type: object
          additionalProperties: true
          description: 'Per-kind target keys (e.g., {agentId}, {branch}).'
        args:
          type: object
          additionalProperties: true
          description: 'Per-kind args; opaque at this layer.'
        idempotencyKey:
          type: string
          description: 'Stable key used to dedupe repeated executions.'
        preconditions:
          type: array
          items: { type: string }
        postconditions:
          type: array
          items: { type: string }

    ActionPlan:
      type: object
      description: |
        What a tending agent emits to mutate state. The daemon (not the
        model) executes; for each action it verifies preconditions, acquires
        locks, evaluates policy + approvals, dry-runs where possible,
        executes through typed RPCs, then re-reads canonical state to
        verify postconditions.
      required: [schemaVersion, jobId, runId, summary, actions, riskClass]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        jobId: { type: string, description: 'Owning tending job ID.' }
        runId: { type: string, description: 'Per-execution run ID (ULID).' }
        summary:
          type: string
          description: 'One-sentence rationale shown in the Activity panel.'
        evidenceRefs:
          type: array
          items: { type: string }
          description: 'Opaque IDs into audit / pane logs / reservations / detections.'
        actions:
          type: array
          items: { $ref: '#/components/schemas/Action' }
        riskClass: { $ref: '#/components/schemas/ApprovalRiskClass' }
        requiresApproval:
          type: boolean
          description: 'True iff at least one action requires human approval.'

    # ─────────────────────────────────────────────────────────────────────────
    # Swarm + Agents (§7.3, §8) — NTM-backed sessions and per-agent state.
    # ─────────────────────────────────────────────────────────────────────────

    SwarmSessionState:
      type: string
      enum: [pending, launching, running, halting, halted, completed, failed]

    AgentState:
      type: string
      description: |
        Tracked by the tending scheduler from canonical NTM + br + Agent Mail
        signals. Composite: a `wedged` agent might also be `rate_limited`;
        the scheduler picks the dominant label.
      enum:
        - launching
        - working
        - idle
        - waiting_approval
        - rate_limited
        - wedged
        - paused
        - completed
        - failed

    SwarmLaunchComposition:
      type: object
      description: |
        One agent slot in a SwarmLaunchSpec. The composition picker (§7.3)
        builds a list of these before launching.
      required: [program, role]
      properties:
        program:
          type: string
          description: 'Agent CLI (`claude-code`, `codex-cli`, `gemini-cli`, `ntm`).'
        model:
          type: string
          description: 'Specific model id (e.g., `claude-opus-4-7`, `gpt-5-codex`).'
        role:
          type: string
          description: 'Agent role label (e.g., `worker`, `tender`, `orchestrator-chat`).'
        skills:
          type: array
          items: { type: string }
          description: 'Skill IDs to load via jsm/jfp (e.g., `vibing-with-ntm`).'
        marchingOrdersTemplate:
          type: string
          description: 'Optional template ID for per-agent marching orders.'

    SwarmLaunchSpec:
      type: object
      description: |
        Frozen launch plan for a swarm. Composed in the picker, persisted as
        an artifact, and replayable for forensics. NTM + jsm pins are
        captured so the launch is reproducible.
      required: [schemaVersion, projectId, composition, requestedBy, requestedAt]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        projectId: { type: string }
        beadSelector:
          type: object
          description: 'Which beads the swarm targets (filter expression or explicit list).'
          properties:
            mode: { enum: [explicit, ready_set, recipe], type: string }
            beadIds:
              type: array
              items: { type: string }
            recipe: { type: string }
        composition:
          type: array
          items: { $ref: '#/components/schemas/SwarmLaunchComposition' }
        budgetPolicyId: { type: string }
        buildQueuePolicyId: { type: string }
        skillsLockSha:
          type: string
          description: |
            SHA-256 of `.hoopoe/skills.lock.json` at launch. Reproducible
            tending requires this match on relaunch.
        requestedBy: { $ref: '#/components/schemas/Actor' }
        requestedAt: { type: string, format: date-time }

    SwarmSession:
      type: object
      description: |
        One running (or completed) NTM-backed swarm session. Read from
        canonical NTM + br state; the daemon does not duplicate session
        truth.
      required: [id, projectId, state, schemaVersion, launchSpecRef]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string, description: 'Swarm ID (ULID).' }
        projectId: { type: string }
        state: { $ref: '#/components/schemas/SwarmSessionState' }
        launchSpecRef:
          type: string
          description: 'ArtifactRef ID for the frozen SwarmLaunchSpec.'
        launchedAt: { type: string, format: date-time }
        haltedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        agentCount: { type: integer, minimum: 0 }
        beadCount: { type: integer, minimum: 0 }
        tmuxSession: { type: string, description: 'NTM/tmux session name.' }

    Agent:
      type: object
      description: |
        One agent within a swarm session. Composed from NTM pane state +
        Agent Mail identity + br claim activity. Snapshotted into the
        renderer; canonical truth is reread on demand.
      required: [id, swarmId, name, program, model, state, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        swarmId: { type: string }
        name:
          type: string
          description: 'Agent Mail name (e.g., "RedMountain"); stable across the session.'
        program:
          type: string
          description: 'CLI program (`claude-code`, `codex-cli`, etc.).'
        model: { type: string }
        role: { type: string }
        state: { $ref: '#/components/schemas/AgentState' }
        currentBeadId: { type: string }
        lastOutputAt: { type: string, format: date-time }
        rateLimitInfo:
          type: object
          properties:
            provider: { type: string }
            resetAt: { type: string, format: date-time }
            severity:
              type: string
              enum: [low, medium, high]
        accountId:
          type: string
          description: 'CAAM account currently bound to this agent.'

    # ─────────────────────────────────────────────────────────────────────────
    # File reservations (Agent Mail) + PaneStreamEvent (NTM)
    # ─────────────────────────────────────────────────────────────────────────

    FileReservation:
      type: object
      description: |
        Advisory lease over a file glob held by an agent (Agent Mail). The
        daemon mirrors but does not own this — Agent Mail is canonical.
      required: [id, projectId, agentName, paths, exclusive, acquiredAt, expiresAt, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        projectId: { type: string }
        agentName: { type: string, description: 'Agent Mail identity.' }
        paths:
          type: array
          items: { type: string }
          description: 'Glob patterns covered by the reservation.'
        exclusive:
          type: boolean
          description: 'False allows shared (advisory-multi-reader) reservations.'
        reason:
          type: string
          description: 'Free-text; bead ID is the convention.'
        acquiredAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }

    PaneStreamEvent:
      type: object
      description: |
        Chunked pane output stream for diagnostics (`Show raw pane`, §7.3
        Guardrail 12). Each chunk has a byte offset so a renderer can
        attach mid-stream and replay from disk later.
      required: [agentId, chunkId, offsetBytes, time, content, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        agentId: { type: string }
        chunkId: { type: string, description: 'Sortable ULID.' }
        offsetBytes:
          type: integer
          minimum: 0
          description: 'Cumulative bytes from start of pane log.'
        time: { type: string, format: date-time }
        content:
          type: string
          description: 'UTF-8 decoded chunk; binary panes are base64-wrapped.'
        truncated:
          type: boolean
          description: 'True iff the chunk was capped at max-chunk-size.'

    # ─────────────────────────────────────────────────────────────────────────
    # Budget + Build queue policies (§2.7, §8.5)
    # ─────────────────────────────────────────────────────────────────────────

    BudgetPolicy:
      type: object
      description: |
        Per-project budget caps surfaced before swarm launch. Tending uses
        them to issue rate-limit detections; the renderer surfaces them in
        the launch wizard with a warning if a swarm would exceed projected
        spend.
      required: [id, projectId, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        projectId: { type: string }
        dailyMaxUsd: { type: number, minimum: 0 }
        weeklyMaxUsd: { type: number, minimum: 0 }
        perAgentMaxUsd: { type: number, minimum: 0 }
        rateLimitWarningPct:
          type: number
          minimum: 0
          maximum: 1
          description: 'Fraction (0–1) of cap at which a warning is emitted.'
        notes: { type: string }

    BuildQueuePolicy:
      type: object
      description: |
        Per-project build/test queue policy (§2.7). Bounds concurrency,
        cache reuse, dedupe behavior, and known-flake handling.
      required: [id, projectId, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        projectId: { type: string }
        maxConcurrentBuilds: { type: integer, minimum: 1, maximum: 64, default: 4 }
        maxConcurrentTests: { type: integer, minimum: 1, maximum: 64, default: 4 }
        cacheReuseAllowed: { type: boolean, default: true }
        dedupeEquivalentCommands: { type: boolean, default: true }
        flakeRetryCount: { type: integer, minimum: 0, maximum: 5, default: 1 }
        rchPreferred:
          type: boolean
          default: true
          description: 'When true, the daemon prefers `rch exec` for builds.'

    # ─────────────────────────────────────────────────────────────────────────
    # Code health (§7.4, §11) + Provider plugin contract (§13)
    # ─────────────────────────────────────────────────────────────────────────

    HealthDimension:
      type: string
      enum: [coverage, complexity, churn, hotspot, lint, security]

    FileHealthMetric:
      type: object
      description: |
        One health metric for a file inside a project. Stored in time-series
        snapshots; rendered as the per-file pill in the Hardening stage.
      required: [path, dimension, value, schemaVersion]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        path: { type: string, description: 'Repo-relative path.' }
        dimension: { $ref: '#/components/schemas/HealthDimension' }
        value: { type: number, description: 'Dimension-specific scale.' }
        rank: { type: integer, minimum: 1, description: 'Hotspot rank (1 = worst).' }
        notes: { type: string }

    CodeHealthSnapshot:
      type: object
      description: |
        Composite project-level health snapshot per §7.4. Captures the
        aggregate health-pill state in the top bar plus the per-file
        contributors.
      required: [id, projectId, schemaVersion, snapshotAt, dimensions, files]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        id: { type: string }
        projectId: { type: string }
        snapshotAt: { type: string, format: date-time }
        dimensions:
          type: object
          description: 'Aggregate per-dimension scores (0–10) for the project.'
          additionalProperties:
            type: number
            minimum: 0
            maximum: 10
        files:
          type: array
          items: { $ref: '#/components/schemas/FileHealthMetric' }

    # ─────────────────────────────────────────────────────────────────────────
    # Provider plugin contract (§6.2, §13) — abstract VPS-provisioning API
    # consumed by the wizard catalog + provider registry. Per-method shapes
    # mirror to packages/schemas/provider-plugin.yaml; the Go interface
    # `schemas.ProviderPlugin` lives in packages/schemas/go/provider.go.
    # ─────────────────────────────────────────────────────────────────────────

    ProviderId:
      type: string
      description: |
        Stable plugin identifier (e.g., `contabo`, `hetzner`, `do`, `ovh`,
        `linode`). Set by the plugin's `init()` registration; the registry
        rejects duplicate IDs.
      pattern: '^[a-z][a-z0-9_-]*$'
      minLength: 1
      maxLength: 64

    ProviderAuthMode:
      type: string
      description: |
        How the user authenticates with the provider. CAAM holds the
        credential material; Hoopoe never stores provider API tokens
        directly (Guardrail 11 generalised — same principle: third-party
        secrets live in CAAM, not in Hoopoe config).
      enum: [api-token, oauth, basic-auth]

    ProviderPluginManifest:
      type: object
      description: |
        Self-describing manifest a provider plugin returns from its
        `Manifest()` method. Surfaces in the wizard's "choose a provider"
        step and in Diagnostics. Plugins ship as Go packages compiled into
        the daemon binary; v1 ships with Contabo only (`hp-9fo`), with the
        registry open for OVH / Hetzner / DigitalOcean follow-ups.
      required: [schemaVersion, providerId, displayName, authMode, capabilities]
      properties:
        schemaVersion: { $ref: '#/components/schemas/SchemaVersion' }
        providerId: { $ref: '#/components/schemas/ProviderId' }
        displayName: { type: string, description: 'e.g., "Contabo Cloud VPS".' }
        homepage:
          type: string
          format: uri
          description: 'Customer-facing landing page; surfaced as the "Visit website" link.'
        authMode: { $ref: '#/components/schemas/ProviderAuthMode' }
        capabilities:
          type: array
          description: |
            Coarse capability flags the plugin opts into. Methods absent
            from this set are treated as unsupported (returning
            `provider.method_unsupported` in `problem+json`).
          items:
            type: string
            enum:
              - vps.list-regions
              - vps.list-sizes
              - vps.create
              - vps.destroy
              - vps.estimate-cost
              - vps.snapshot
              - vps.resize
              - dns.update
              - billing.fetch
        defaultRegion:
          type: string
          description: 'Region ID to preselect in the wizard.'
        defaultImage:
          type: string
          description: |
            Provider-specific image ID for "Ubuntu 24.04+ LTS"; used when
            the user accepts defaults in the create wizard.
        notes:
          type: string
          description: |
            Free-text human-readable note (e.g., "billing in EUR; minimum
            30-day commitment"). Surfaced in Diagnostics + the wizard.

    ProviderRegion:
      type: object
      description: One geographic region offered by a provider.
      required: [id, name, country, available]
      properties:
        id:
          type: string
          description: Provider-specific region ID (e.g., `eu-central-1`).
        name:
          type: string
          description: Human-readable label (e.g., "Frankfurt, Germany").
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code (e.g., `DE`).
          pattern: '^[A-Z]{2}$'
        city:
          type: string
          description: 'Optional city label (e.g., "Frankfurt").'
        available:
          type: boolean
          description: 'True when the region is currently provisioning instances.'
        notes:
          type: string

    ProviderStorageType:
      type: string
      enum: [NVMe, SSD, HDD]

    ProviderSizeTier:
      type: string
      description: |
        Sizing recommendation per §6.2. The wizard renders a "recommended"
        chip on `recommended` sizes and a "minimum" chip on `minimum`
        sizes; intermediate sizes are `workable`.
      enum: [recommended, workable, minimum]

    ProviderSize:
      type: object
      description: One instance size (CPU / RAM / disk / bandwidth + monthly cost).
      required: [id, cpuVCores, ramGB, storageGB, storageType, bandwidthTB, monthlyUSD, tier]
      properties:
        id: { type: string }
        cpuVCores: { type: integer, minimum: 1 }
        ramGB: { type: integer, minimum: 1 }
        storageGB: { type: integer, minimum: 1 }
        storageType: { $ref: '#/components/schemas/ProviderStorageType' }
        bandwidthTB:
          type: integer
          minimum: 0
          description: 'Included monthly bandwidth in TB; 0 means unmetered.'
        monthlyUSD:
          type: number
          minimum: 0
          description: 'List price the customer is charged per month.'
        tier: { $ref: '#/components/schemas/ProviderSizeTier' }
        recommended:
          type: boolean
          description: |
            Convenience flag matching `tier == 'recommended'`. Both are
            populated for clients that prefer either form.

    ProviderCreateInstanceOpts:
      type: object
      description: |
        Inputs to `createInstance`. The SSH public key is the OpenSSH-format
        material the wizard generated (or imported from CAAM); the daemon
        never sees the matching private key.
      required: [region, size, sshPubKey, name, imageId]
      properties:
        region: { type: string, description: 'Region ID from `listRegions`.' }
        size: { type: string, description: 'Size ID from `listSizes`.' }
        sshPubKey:
          type: string
          description: |
            OpenSSH-format public key (`ssh-ed25519 ...` or `ssh-rsa ...`).
            The daemon validates the format before forwarding to the plugin.
        name:
          type: string
          description: 'Human-friendly instance name (e.g., `hoopoe-acfs-2026-05-04`).'
          pattern: '^[a-zA-Z0-9._-]+$'
          minLength: 1
          maxLength: 128
        imageId:
          type: string
          description: |
            Provider-specific image ID (Ubuntu 24.04+ default per §6.5).
            Defaults to `ProviderPluginManifest.defaultImage` when empty.
        tags:
          type: object
          additionalProperties: { type: string }
          description: 'Optional provider-specific tag map (audit / cost-allocation).'

    ProviderInstanceStatus:
      type: string
      enum: [provisioning, running, failed, destroyed]

    ProviderInstance:
      type: object
      description: |
        Result of `createInstance` (and the steady-state shape after
        provisioning succeeds). The IP may be unset while
        `status == provisioning`.
      required: [instanceId, status, createdAt, region, size, monthlyUSD]
      properties:
        instanceId: { type: string }
        ip:
          type: string
          description: 'IPv4 or IPv6 address; empty until status == running.'
        status: { $ref: '#/components/schemas/ProviderInstanceStatus' }
        createdAt: { type: string, format: date-time }
        region: { type: string }
        size: { type: string }
        monthlyUSD:
          type: number
          minimum: 0
          description: 'Actual billing cost the user will see.'
        providerInstanceUrl:
          type: string
          format: uri
          description: 'Optional deep-link into the provider dashboard.'

    ProviderDestroyResult:
      type: object
      required: [ok, instanceId]
      properties:
        ok: { type: boolean }
        instanceId: { type: string }
        notes:
          type: string
          description: |
            Optional free-text from the provider (e.g., "instance destroyed,
            backup retained for 7 days").

    ProviderEstimateCostOpts:
      type: object
      required: [region, size]
      properties:
        region: { type: string }
        size: { type: string }
        bandwidthTBExpected:
          type: number
          minimum: 0
          description: 'Expected monthly bandwidth in TB; defaults to 1 if omitted.'

    ProviderCostLineItem:
      type: object
      required: [label, usd]
      properties:
        label:
          type: string
          description: |
            Cost component (e.g., `compute`, `bandwidth`, `storage`,
            `datacenter-surcharge`). Plugins should keep this stable across
            calls so renderer caches don't churn.
        usd: { type: number, minimum: 0 }

    ProviderCostEstimate:
      type: object
      description: |
        Output of `estimateMonthlyCost`. The `usd` total must match the
        sum of `breakdown[].usd` (renderer asserts this).
      required: [usd, breakdown, catalogVersion, estimatedAt]
      properties:
        usd:
          type: number
          minimum: 0
          description: 'Total expected monthly cost in USD.'
        currency:
          type: string
          description: |
            Currency the provider actually bills in (e.g., `USD`, `EUR`).
            Hoopoe always normalizes the displayed value to USD; this
            field surfaces the original for cost-transparency.
          pattern: '^[A-Z]{3}$'
        breakdown:
          type: array
          items: { $ref: '#/components/schemas/ProviderCostLineItem' }
        catalogVersion:
          type: string
          description: |
            Stable identifier of the catalog snapshot used for this
            estimate (e.g., `contabo-2026-05-04T00:00`). Lets the wizard
            invalidate stale estimates when the provider repriced.
        estimatedAt: { type: string, format: date-time }

    # Backward-compatible alias — hp-r3i shipped the thin contract under
    # this name; the migration plan (provider-plugin.yaml + READMEs)
    # references the new manifest. Kept as an alias so existing TS imports
    # (`type ProviderPluginContract`) still resolve.
    ProviderPluginContract:
      $ref: '#/components/schemas/ProviderPluginManifest'

    ProviderListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ProviderPluginManifest' }

    ProviderRegionListResponse:
      type: object
      required: [providerId, items]
      properties:
        providerId: { $ref: '#/components/schemas/ProviderId' }
        items:
          type: array
          items: { $ref: '#/components/schemas/ProviderRegion' }

    ProviderSizeListResponse:
      type: object
      required: [providerId, regionId, items]
      properties:
        providerId: { $ref: '#/components/schemas/ProviderId' }
        regionId: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/ProviderSize' }
