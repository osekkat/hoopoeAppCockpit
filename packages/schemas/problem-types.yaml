# RFC 7807 problem-type registry (hp-g6sp).
#
# Single source of truth for the daemon's error responses: every error
# the daemon emits must reference an `id` in this file. Renderers
# (hp-8dym), Diagnostics catalog (hp-6d7), and per-endpoint contract
# tests all read this file — no hand-written error JSON anywhere.
#
# Schema (per RFC 7807 + Hoopoe extensions):
#   id              stable internal id (referenced from Go ProblemError + tests)
#   type_uri        canonical URL — RFC 7807 'type' field
#   title           short, human-readable summary
#   status          HTTP status code
#   surface         renderer hint: toast | banner | inline_pill | blocking_modal
#   actionability   suggested user action: reload | re-pair | edit-deps |
#                   switch-account | open-docs | manual
#   user_message    text shown to the user; supports {{var}} templating
#                   from ProblemExtensions
#   detail_template optional template for RFC 7807 'detail' field; same
#                   templating; redacted via the daemon redaction layer
#                   before serialization
#
# Adding a new problem type = add an entry here AND wrap the Go error
# with `ProblemTypeID() string` returning the id. The drift checker
# will fail CI if a Go ProblemError points at an id that doesn't exist
# here.

schemaVersion: 1

problems:
  # ──────────────────────────────────────────────────────────────────
  # Auth (§2.6 /v1/auth/*)
  # ──────────────────────────────────────────────────────────────────
  - id: auth.pairing.token-expired
    type_uri: https://hoopoe.io/problems/auth/pairing-token-expired
    title: Pairing token has expired
    status: 401
    surface: blocking_modal
    actionability: re-pair
    user_message: The pairing token expired. Re-pair to continue.
    detail_template: Pairing token issued at {{issuedAt}} expired at {{expiredAt}}.

  - id: auth.pairing.token-invalid
    type_uri: https://hoopoe.io/problems/auth/pairing-token-invalid
    title: Pairing token is invalid
    status: 401
    surface: blocking_modal
    actionability: re-pair
    user_message: The pairing token did not match. Re-pair to continue.

  - id: auth.bearer.invalid
    type_uri: https://hoopoe.io/problems/auth/bearer-invalid
    title: Bearer token is invalid
    status: 401
    surface: blocking_modal
    actionability: re-pair
    user_message: Your session is no longer valid. Re-pair to continue.

  - id: auth.bearer.expired
    type_uri: https://hoopoe.io/problems/auth/bearer-expired
    title: Bearer token has expired
    status: 401
    surface: blocking_modal
    actionability: re-pair
    user_message: Your session expired. Re-pair to continue.

  - id: auth.ws-token.invalid
    type_uri: https://hoopoe.io/problems/auth/ws-token-invalid
    title: WebSocket token is invalid
    status: 401
    surface: banner
    actionability: reload
    user_message: WebSocket connection refused. Reload to retry.

  # ──────────────────────────────────────────────────────────────────
  # Projects (§2.6 /v1/projects/*)
  # ──────────────────────────────────────────────────────────────────
  - id: project.not-found
    type_uri: https://hoopoe.io/problems/project/not-found
    title: Project not found
    status: 404
    surface: banner
    actionability: open-docs
    user_message: 'Project {{projectId}} was not found on this VPS.'

  - id: project.already-exists
    type_uri: https://hoopoe.io/problems/project/already-exists
    title: Project already exists
    status: 409
    surface: inline_pill
    actionability: manual
    user_message: 'A project with name {{name}} already exists at {{path}}.'

  - id: project.invalid-name
    type_uri: https://hoopoe.io/problems/project/invalid-name
    title: Invalid project name
    status: 422
    surface: inline_pill
    actionability: manual
    user_message: Project name must match {{pattern}}.

  # ──────────────────────────────────────────────────────────────────
  # Plans (§2.6 /v1/projects/{id}/plans/*)
  # ──────────────────────────────────────────────────────────────────
  - id: plan.not-found
    type_uri: https://hoopoe.io/problems/plan/not-found
    title: Plan not found
    status: 404
    surface: banner
    actionability: open-docs
    user_message: 'Plan {{planId}} was not found in this project.'

  - id: plan.locked
    type_uri: https://hoopoe.io/problems/plan/locked
    title: Plan is locked
    status: 409
    surface: banner
    actionability: manual
    user_message: 'This plan is locked (locked at {{lockedAt}}). Unlock it before making changes.'

  # ──────────────────────────────────────────────────────────────────
  # Beads (§2.6 /v1/projects/{id}/beads/*)
  # ──────────────────────────────────────────────────────────────────
  - id: bead.not-found
    type_uri: https://hoopoe.io/problems/bead/not-found
    title: Bead not found
    status: 404
    surface: banner
    actionability: open-docs
    user_message: 'Bead {{beadId}} was not found in this project.'

  - id: bead.cycle-detected
    type_uri: https://hoopoe.io/problems/bead/cycle-detected
    title: Dependency cycle detected
    status: 422
    surface: banner
    actionability: edit-deps
    user_message: 'Adding this dependency would create a cycle: {{cyclePath}}'

  - id: bead.conversion-failed
    type_uri: https://hoopoe.io/problems/bead/conversion-failed
    title: Bead conversion failed
    status: 422
    surface: banner
    actionability: open-docs
    user_message: 'Could not convert plan to beads: {{reason}}'

  # ──────────────────────────────────────────────────────────────────
  # Swarm (§2.6 /v1/projects/{id}/swarms/*)
  # ──────────────────────────────────────────────────────────────────
  - id: swarm.not-found
    type_uri: https://hoopoe.io/problems/swarm/not-found
    title: Swarm not found
    status: 404
    surface: banner
    actionability: open-docs
    user_message: 'Swarm {{swarmId}} was not found.'

  - id: swarm.already-running
    type_uri: https://hoopoe.io/problems/swarm/already-running
    title: Swarm already running
    status: 409
    surface: banner
    actionability: manual
    user_message: 'A swarm is already running for this project (since {{startedAt}}).'

  - id: swarm.budget-exceeded
    type_uri: https://hoopoe.io/problems/swarm/budget-exceeded
    title: Swarm budget exceeded
    status: 422
