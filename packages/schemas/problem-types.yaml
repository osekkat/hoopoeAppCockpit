    actionability: switch-account
    user_message: 'Daily budget for {{provider}} exceeded ({{used}} / {{limit}}). Switch accounts or wait until {{resetAt}}.'

  # ──────────────────────────────────────────────────────────────────
  # Mail (§2.6 /v1/projects/{id}/mail/*)
  # ──────────────────────────────────────────────────────────────────
  - id: mail.thread-not-found
    type_uri: https://hoopoe.io/problems/mail/thread-not-found
