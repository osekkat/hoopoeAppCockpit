  - id: internal-error
    type_uri: https://hoopoe.io/problems/internal-error
    title: Internal Server Error
    status: 500
    surface: blocking_modal
    actionability: reload
    user_message: 'An internal error occurred (correlation id: {{correlationId}}). Please retry; if the issue persists, contact support.'
