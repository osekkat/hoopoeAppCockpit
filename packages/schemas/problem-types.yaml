    actionability: open-docs
    user_message: 'Mail thread {{threadId}} was not found.'

  # ──────────────────────────────────────────────────────────────────
  # Reservations (§2.6 /v1/projects/{id}/reservations/*)
  # ──────────────────────────────────────────────────────────────────
  - id: reservation.conflict
    type_uri: https://hoopoe.io/problems/reservation/conflict
    title: File reservation conflict
    status: 409
    surface: inline_pill
    actionability: manual
    user_message: 'Path pattern {{pattern}} is already reserved by {{holder}} until {{expiresAt}}.'

  - id: reservation.not-found
    type_uri: https://hoopoe.io/problems/reservation/not-found
    title: Reservation not found
    status: 404
    surface: inline_pill
    actionability: manual
    user_message: 'Reservation {{reservationId}} was not found.'

  # ──────────────────────────────────────────────────────────────────
  # Health (§2.6 /v1/projects/{id}/health/*)
  # ──────────────────────────────────────────────────────────────────
  - id: health.snapshot-failed
    type_uri: https://hoopoe.io/problems/health/snapshot-failed
    title: Health snapshot failed
    status: 500
    surface: banner
    actionability: open-docs
    user_message: 'Could not capture health snapshot: {{reason}}'

  # ──────────────────────────────────────────────────────────────────
  # Reviews (§2.6 /v1/projects/{id}/reviews/*)
  # ──────────────────────────────────────────────────────────────────
  - id: review.round-already-active
    type_uri: https://hoopoe.io/problems/review/round-already-active
    title: Review round already active
    status: 409
    surface: banner
    actionability: manual
    user_message: 'Review round {{round}} is already running for this project.'

  # ──────────────────────────────────────────────────────────────────
  # Tending / ActionPlan (§2.6 /v1/tending/*)
  # ──────────────────────────────────────────────────────────────────
