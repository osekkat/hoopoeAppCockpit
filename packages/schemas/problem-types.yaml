    status: 422
    surface: toast
    actionability: open-docs
    user_message: 'Action kind {{kind}} is not in tending-actions.yaml.'

  - id: action-plan.precondition-failed
    type_uri: https://hoopoe.io/problems/action-plan/precondition-failed
    title: Action precondition failed
    status: 412
    surface: banner
    actionability: open-docs
    user_message: 'Precondition for {{kind}} did not hold: {{precondition}}'

  - id: action-plan.postcondition-failed
    type_uri: https://hoopoe.io/problems/action-plan/postcondition-failed
    title: Action postcondition failed
    status: 500
    surface: banner
    actionability: open-docs
    user_message: 'Action {{kind}} executed but postcondition failed: {{postcondition}}'

  # ──────────────────────────────────────────────────────────────────
  # Approvals (§2.6 /v1/approvals/*)
  # ──────────────────────────────────────────────────────────────────
  - id: approval.required
    type_uri: https://hoopoe.io/problems/approval/required
    title: Approval required
    status: 403
    surface: blocking_modal
    actionability: manual
    user_message: 'This action requires approval (riskClass: {{riskClass}}). Submit for approval to proceed.'

  - id: approval.denied
    type_uri: https://hoopoe.io/problems/approval/denied
    title: Approval denied
    status: 403
    surface: blocking_modal
    actionability: manual
    user_message: 'Approval was denied: {{reason}}'

  # ──────────────────────────────────────────────────────────────────
  # Idempotency (hp-ngq cross-reference)
  # ──────────────────────────────────────────────────────────────────
  - id: idempotency.key-required
    type_uri: https://hoopoe.io/problems/idempotency/key-required
    title: Idempotency key required
    status: 400
    surface: toast
    actionability: reload
    user_message: This write endpoint requires an Idempotency-Key header.

  - id: idempotency.key-conflict
    type_uri: https://hoopoe.io/problems/idempotency/key-conflict
    title: Idempotency key already used with different body
    status: 409
    surface: toast
    actionability: manual
    user_message: 'Idempotency key {{key}} was previously used with a different request body.'

  # ──────────────────────────────────────────────────────────────────
  # Defaults / fallbacks
  # ──────────────────────────────────────────────────────────────────
  - id: not-found
    type_uri: https://hoopoe.io/problems/not-found
    title: Not Found
    status: 404
    surface: banner
    actionability: open-docs
    user_message: The requested resource was not found.

  - id: method-not-allowed
