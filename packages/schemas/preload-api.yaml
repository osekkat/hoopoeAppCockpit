# preload-api.yaml — closed surface for the renderer ↔ preload ↔ main IPC.
#
# Per hp-rflj (renderer hardening, §5.4 lines 1-2): the renderer cannot reach
# the filesystem, network, SSH, Keychain, or daemon tokens directly.
# Everything goes through `window.hoopoe.<group>.<method>` which is enforced
# at three layers:
#
#   1. preload (`apps/desktop/electron/preload.ts`) — exposes ONLY methods
#      from the `preloadChannels` map below; everything else is undefined
#      to the renderer.
#   2. main-side IpcRegistry (`apps/desktop/src/main/IpcRegistry.ts`) —
#      `register()` and `dispatch()` consult the same allowlist before
#      dispatching. Defense-in-depth: even if the preload boundary is ever
#      bypassed (e.g. via a future renderer change that imports `electron`
#      directly), the main side still refuses unknown channels.
#   3. parity test (`apps/desktop/src/shared/ipc-contract.test.ts`) —
#      runtime check that what main-side has REGISTERED matches what this
#      file DECLARES. Disagreement is a build-time failure.
#
# This file is the SINGLE SOURCE OF TRUTH; `apps/desktop/src/shared/
# ipc-contract.ts` is generated from it by
# `packages/schemas/scripts/gen-preload-contract.ts`. The codegen drift
# gate (`validate-preload`) re-runs the generator and byte-compares
# against the committed file; CI fails on drift.
#
# Adding a new method/topic/channel is a SECURITY-RELEVANT change. Each
# entry expands the renderer's reach. Review the bead it's tied to and
# the threat model in this file's header before extending.
#
# Cross-references:
#   - hp-rflj (renderer hardening — this file's parent bead)
#   - hp-r3i  (packages/schemas — codegen substrate)
#   - hp-n5za (the original manual ipc-contract.ts hardening)
#   - plan.md §5.4 — renderer + preload security
#   - review-findings.md "Renderer preload — [HIGH] no allowlist gate"

schemaVersion: 1
mirrorsTsFile: ../../apps/desktop/src/shared/ipc-contract.ts
# When the apps/desktop owner switches ipc-contract.ts to import from the
# generated file (`apps/desktop/src/shared/ipc-contract.gen.ts`), update
# `mirrorsTsFile` to point at the .gen.ts file. Until then, the generator
# emits the .gen.ts beside the manual file and the parity test compares
# them so they cannot drift.

# ── 1. Daemon RPC methods ──────────────────────────────────────────────────
#
# Method NAMES carried in `hoopoe.daemon.request` IPC bodies. Each one
# corresponds to a single daemon HTTP/gRPC method. Inputs/outputs reference
# component schemas in openapi.yaml so the renderer ↔ daemon round-trip is
# typed end-to-end.
daemonRequestMethods:
  ping:
    description: Health probe — returns immediately if the daemon is reachable.
    bead: hp-n5za
    input: { type: 'null' }
    output:
      type: object
      properties:
        ok: { type: boolean }
  health:
    description: Coarse liveness/adapter status (cheap; no full capability check).
    bead: hp-r3i
    input: { type: 'null' }
    output: { $ref: ./openapi.yaml#/components/schemas/HealthResponse }
  version:
    description: Daemon build version + commit + signing/SBOM digests.
    bead: hp-r3i
    input: { type: 'null' }
    output: { $ref: ./openapi.yaml#/components/schemas/VersionResponse }
  capabilities:
    description: Capability registry snapshot (every adapter, every capID).
    bead: hp-r33
    input: { type: 'null' }
    output: { $ref: ./openapi.yaml#/components/schemas/CapabilityRegistry }
  auth.exchangePairingForBearer:
    description: |
      Consume a pairing token, return a 30-day bearer session. Required for
      first-run pairing.
    bead: hp-n5za
    input:
      type: object
      required: [pairingToken]
      properties:
        pairingToken: { type: string }
    output:
      type: object
      required: [bearer, sessionId, expiresAt]
      properties:
        bearer: { type: string }
        sessionId: { type: string }
        expiresAt: { type: string, format: date-time }
  auth.issueWsToken:
    description: Mint a 5-min WS token from the current bearer.
    bead: hp-n5za
    input: { type: 'null' }
    output:
      type: object
      required: [wsToken, expiresAt]
      properties:
        wsToken: { type: string }
        expiresAt: { type: string, format: date-time }
  settings.get:
    description: Read tier-resolved settings tree.
    bead: hp-n5za
    input:
      type: object
      properties:
        scope: { type: string, enum: [user, project, merged] }
    output:
      type: object
      additionalProperties: true
  settings.set:
    description: Write a setting at user or project tier.
    bead: hp-n5za
    input:
      type: object
      required: [tier, key, value]
      properties:
        tier: { type: string, enum: [user, project] }
        key: { type: string }
        value: {}
    output:
      type: object
      properties:
        ok: { type: boolean }
  projects.list:
    description: List projects on this VPS (paginated).
    bead: hp-r3i
    input: { type: 'null' }
    output: { $ref: ./openapi.yaml#/components/schemas/ProjectListResponse }
  projects.create:
    description: |
      Create a new project from scratch under /data/projects/<slug>. Initializes
      git, .hoopoe/, .beads/. Idempotent via Idempotency-Key per §4.1.
    bead: hp-ilt
    input:
      type: object
      required: [name, originRemote]
      properties:
        name: { type: string }
        originRemote: { type: string, description: "Required per §1.1; v1 has no remoteless mode" }
        slug: { type: string }
    output:
      type: object
      required: [projectId, rootPath]
      properties:
        projectId: { type: string }
        rootPath: { type: string }
  projects.import:
    description: |
      Import an existing checkout at a VPS path. Validates origin remote,
      initializes .hoopoe/, runs br init if .beads/ missing, registers project.
      Idempotent via Idempotency-Key.
    bead: hp-ilt
    input:
      type: object
      required: [rootPath]
      properties:
        rootPath: { type: string, description: "Absolute VPS path to existing repo" }
        name: { type: string, description: "Override name (default: basename)" }
    output:
      type: object
      required: [projectId, rootPath, readiness]
      properties:
        projectId: { type: string }
        rootPath: { type: string }
        readiness: { type: object, additionalProperties: true }
  projects.clone:
    description: |
      Clone a remote URL onto the VPS at /data/projects/<slug>, then run
      the same import steps. Idempotent via Idempotency-Key.
    bead: hp-ilt
    input:
      type: object
      required: [remoteUrl]
      properties:
        remoteUrl: { type: string }
        name: { type: string }
        targetParentDir: { type: string, description: "Default: /data/projects" }
    output:
      type: object
      required: [projectId, rootPath]
      properties:
        projectId: { type: string }
        rootPath: { type: string }
  projects.readiness:
    description: |
      Evaluate the §4.2 'Project imported' gate invariant for a path. Read-only —
      reports git/AGENTS.md/.hoopoe/manifest state without mutating anything.
    bead: hp-ilt
    input:
      type: object
      required: [rootPath]
      properties:
        rootPath: { type: string }
        allowNoLanguageManifest: { type: boolean }
    output:
      type: object
      required: [gate, satisfied, requirements]
      properties:
        gate: { type: string, enum: [imported] }
        rootPath: { type: string }
        satisfied: { type: boolean }
        requirements:
          type: array
          items:
            type: object
            required: [id, label, satisfied]
            properties:
              id: { type: string }
              label: { type: string }
              satisfied: { type: boolean }
              note: { type: string }
  beads.get:
    description: Fetch a single bead with edges.
    bead: hp-r3i
    input:
      type: object
      required: [projectId, beadId]
      properties:
        projectId: { type: string }
        beadId: { type: string }
    output: { $ref: ./openapi.yaml#/components/schemas/Bead }
  triage.get:
    description: Read bv triage snapshot for a project.
    bead: hp-pjp
    input:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
    output:
      type: object
      additionalProperties: true
  swarm.snapshot:
    description: Read swarm session state for a project.
    bead: hp-r3i
    input:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
    output:
      type: object
      additionalProperties: true
  mail.dump:
    description: Read agent mail messages for a project / thread.
    bead: hp-r3i
    input:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
        threadId: { type: string }
    output:
      type: object
      additionalProperties: true
  reservations.list:
    description: List file reservations for a project.
    bead: hp-r3i
    input:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
    output:
      type: array
      items: { $ref: ./openapi.yaml#/components/schemas/FileReservation }
  build-log.get:
    description: Read a build/test job log slice.
    bead: hp-r3i
    input:
      type: object
      required: [jobId]
      properties:
        jobId: { type: string }
        offsetBytes: { type: integer, minimum: 0 }
    output:
      type: object
      additionalProperties: true
  pane-log.get:
    description: |
      Read an agent pane log slice (Diagnostics surface only — Guardrail 12
      forbids surfacing raw panes in the default Swarm UI).
    bead: hp-r3i
    input:
      type: object
      required: [agentId]
      properties:
        agentId: { type: string }
        offsetBytes: { type: integer, minimum: 0 }
    output:
      type: array
      items: { $ref: ./openapi.yaml#/components/schemas/PaneStreamEvent }
  approvals.list:
    description: List approvals for a project (Activity panel).
    bead: hp-v0g
    input:
      type: object
      required: [projectId]
      properties:
        projectId: { type: string }
    output: { $ref: ./openapi.yaml#/components/schemas/ApprovalListResponse }
  approvals.approve:
    description: Approve a pending approval.
    bead: hp-v0g
    input:
      type: object
      required: [projectId, approvalId, decisionActor]
      properties:
        projectId: { type: string }
        approvalId: { type: string }
        decisionActor: { $ref: ./openapi.yaml#/components/schemas/Actor }
        note: { type: string }
        scope: { $ref: ./openapi.yaml#/components/schemas/ApprovalScope }
    output: { $ref: ./openapi.yaml#/components/schemas/Approval }
  approvals.deny:
    description: Deny a pending approval.
    bead: hp-v0g
    input:
      type: object
      required: [projectId, approvalId, decisionActor]
      properties:
        projectId: { type: string }
        approvalId: { type: string }
        decisionActor: { $ref: ./openapi.yaml#/components/schemas/Actor }
        note: { type: string }
    output: { $ref: ./openapi.yaml#/components/schemas/Approval }
  approvals.extend:
    description: Extend the expiration of a pending approval.
    bead: hp-v0g
    input:
      type: object
      required: [projectId, approvalId, additionalSeconds]
      properties:
        projectId: { type: string }
        approvalId: { type: string }
        additionalSeconds: { type: integer, minimum: 60, maximum: 86400 }
    output: { $ref: ./openapi.yaml#/components/schemas/Approval }
  tunnel.snapshot:
    description: |
      Read the current ConnectionManager FSM snapshot (state, active profile,
      local port, last fault, reconnect attempts, nextRetryAt). Surfaces
      hp-e7k's pure FSM via the orchestrator from hp-fkov so the renderer
      can render the ConnectionStatus pill + ToolHealthPill VPS dot.
    bead: hp-m79e
    input: { type: 'null' }
    output:
      type: object
      required: [state, activeProfileId, localPort, lastFault, reconnectAttempts, nextRetryAt]
      properties:
        state:
          type: string
          enum: [unconfigured, ssh_probing, bootstrapping, tunnel_connecting, authenticating, ready, degraded, reconnecting, disconnected]
        activeProfileId: { type: [string, "null"] }
        localPort: { type: [integer, "null"] }
        lastFault:
          type: [object, "null"]
          properties:
            code: { type: string }
            message: { type: string }
            capturedAt: { type: string, format: date-time }
        reconnectAttempts: { type: integer, minimum: 0 }
        nextRetryAt: { type: [string, "null"], format: date-time }

# ── 2. Daemon WS subscribe topics ──────────────────────────────────────────
#
# Topics the renderer is ENTITLED to observe via `hoopoe.daemon.subscribe`.
# Internal-only topics (audit log, redaction trace, settings tier-merge)
# are intentionally absent — those flow only inside main. Adding a topic
# expands the renderer's read surface.
daemonSubscribeTopics:
  events.swarm:
    description: Swarm session lifecycle + agent state changes.
    bead: hp-r3i
  events.beads:
    description: Bead state changes (status, priority, dependency edges).
    bead: hp-r3i
  events.activity:
    description: Cross-stage activity events (Activity panel timeline).
    bead: hp-1r4
  events.health:
    description: Code-health snapshot updates.
    bead: hp-r3i
  events.tend:
    description: Tending job runs + ActionPlan executions.
    bead: hp-r3i
  events.approvals:
    description: Approval queue changes (new pending, decided, expired).
    bead: hp-v0g
  events.replay:
    description: Mock Flywheel replay events (development / fixture-driven runs).
    bead: hp-o74
  events.settings:
    description: Settings tree change notifications (resolved tier only).
    bead: hp-n5za
  events.clone.dirty:
    description: |
      Per-project local-clone dirty state changes (modified, untracked,
      ahead/behind counts). Emitted by the desktop main process clone
      watcher whenever a debounced filesystem event triggers a fresh
      probeDirtyState call. Powers the "Local clone has unsaved changes"
      banner in the stage header.
    bead: hp-ndx5
  events.tunnel:
    description: |
      ConnectionManager FSM transitions (state, fault, reconnect attempts,
      next-retry timestamp). Emitted by the desktop main-process tunnel
      orchestrator (hp-fkov) on every FSM dispatch so the
      ConnectionStatus pill renders live state without polling.
    bead: hp-m79e

# ── 3. Preload IPC channels (preload ↔ main) ───────────────────────────────
#
# One channel per direct preload method. Daemon RPC methods all multiplex
# over `hoopoe.daemon.request`; these are the channels for everything else.
# The PRELOAD_IPC_CHANNELS map is generated from this section.
preloadChannels:
  daemonRequest: hoopoe.daemon.request
  daemonSubscribe: hoopoe.daemon.subscribe
  daemonUnsubscribe: hoopoe.daemon.unsubscribe
  settingsGet: hoopoe.settings.get
  settingsSet: hoopoe.settings.set
  settingsWatch: hoopoe.settings.watch
  keybindingsCompile: hoopoe.keybindings.compile
  keybindingsDispatch: hoopoe.keybindings.dispatch
  approvalsList: hoopoe.approvals.list-pending
  approvalsApprove: hoopoe.approvals.approve
  approvalsDeny: hoopoe.approvals.deny
  approvalsExtend: hoopoe.approvals.extend
  filesOpenExternal: hoopoe.files.open-external
  filesRevealInFinder: hoopoe.files.reveal-in-finder
  filesRipgrep: hoopoe.files.ripgrep
  # hp-pl8h: SSH key wizard step. listKeys reads ~/.ssh/ and returns
  # `{name, path, algorithm, fingerprint}` for each `*.pub` it finds.
  # generateKey shells out to `ssh-keygen -t ed25519 -f ~/.ssh/<derived>
  # -N "" -C "<comment>"` with EXPLICIT argv (no shell). The renderer
  # never supplies the file path or comment string verbatim — main
  # derives both from the run-id (UUID) so a malicious renderer cannot
  # write outside ~/.ssh/ or inject ssh-keygen flags.
  sshListKeys: hoopoe.ssh.listKeys
  sshGenerateKey: hoopoe.ssh.generateKey
  # hp-58wp: Local-clone destructive action. Runs `git reset --hard @{u}`
  # followed by `git clean -fd` against the project's local clone in the
  # main process. The renderer NEVER supplies the clone path or argv —
  # main resolves the path from the project registry and invokes git
  # with explicit, non-interpolated argv (Guardrail 2). Audit fires on
  # every invocation regardless of outcome (Guardrail 10).
  cloneDiscardLocalChanges: hoopoe.clone.discard-local-changes
  # hp-5bhy: Three more clone-action channels backing the
  # CloneSettingsCard (hp-1fd1) per-project + cache-view actions. Same
  # safety posture as cloneDiscardLocalChanges — the renderer carries
  # only the projectId; main resolves the clone path from the project
  # registry and audits every invocation regardless of outcome.
  cloneRevealInFinder: hoopoe.clone.reveal-in-finder
  cloneOpenInTerminal: hoopoe.clone.open-in-terminal
  cloneSetCapOverride: hoopoe.clone.set-cap-override
  # hp-6gs4 / hp-ark: Scoped Mac awake assertion while a ChatGPT Pro Oracle
  # browser round is actively running. Main owns the OS-level mechanisms
  # (powerSaveBlocker / NSProcessInfo / caffeinate); renderer carries only
  # round metadata across the IPC boundary. Acquire takes
  # `{roundId, modelId?, oracleTopology?, estimatedDurationMs?, reason?}`;
  # release takes `{assertionId, reason?}`; snapshot takes `{}`. All three
  # return a PowerAssertionSnapshot. Input/output validators live next to
  # the IpcRegistry registrations at apps/desktop/src/main/macPowerAssert.ts
  # (assertAcquireInput / assertReleaseInput / assertEmptyObject /
  # assertPowerAssertionSnapshot). Audit fires on every acquire/release
  # via the manager's audit sink (Guardrail 10).
  powerAcquire: hoopoe.power.acquire
  powerRelease: hoopoe.power.release
  powerSnapshot: hoopoe.power.snapshot

# ── 3a. Typed direct preload channel contracts ────────────────────────────
#
# Every entry in `preloadChannels` that is INVOKE-style (renderer asks main
# something, awaits a response) MUST also appear here with declared input and
# output type names. The names point at TypeScript interfaces in
# `apps/desktop/src/shared/ipc-contract.ts`; main-side IpcRegistry handlers
# are required to register `validateInput`/`validateOutput` validators that
# narrow untrusted renderer payloads to those exact shapes (see
# `apps/desktop/src/main/IpcRegistry.ts:182-194` — registration without both
# validators throws).
#
# Channels intentionally absent from this section (the codegen gate
# in `gen-preload-contract.ts:assertValidPreloadContracts` enumerates them):
#   - daemonRequest / daemonSubscribe / daemonUnsubscribe — multiplexers; payload
#     types live in §1 daemonRequestMethods + §2 daemonSubscribeTopics.
#   - settingsWatch — subscribe-style (main pushes events to renderer); not
#     request/response.
#
# Adding a new direct preload channel requires extending this section, or
# the codegen run + parity test fail and the build is blocked.
#
# History: hp-ey3 introduced the section for the three power assertion
# channels; hp-3zc widened it to cover settings/keybindings/approvals/files/
# ssh/clone, lifted the gate from "powerAcquire-shaped" to "covers every
# invoke-style channel", and pinned matching TS interfaces in ipc-contract.ts.
preloadChannelContracts:
  settingsGet:
    channel: settingsGet
    input: SettingsGetInput
    output: SettingsGetOutput
  settingsSet:
    channel: settingsSet
    input: SettingsSetInput
    output: SettingsSetOutput
  keybindingsCompile:
    channel: keybindingsCompile
    input: KeybindingsCompileInput
    output: KeybindingsCompileOutput
  keybindingsDispatch:
    channel: keybindingsDispatch
    input: KeybindingsDispatchInput
    output: KeybindingsDispatchOutput
  approvalsList:
    channel: approvalsList
    input: ApprovalsListInput
    output: ApprovalsListOutput
  approvalsApprove:
    channel: approvalsApprove
    input: ApprovalsDecisionInput
    output: ApprovalsDecisionOutput
  approvalsDeny:
    channel: approvalsDeny
    input: ApprovalsDecisionInput
    output: ApprovalsDecisionOutput
  approvalsExtend:
    channel: approvalsExtend
    input: ApprovalsExtendInput
    output: ApprovalsDecisionOutput
  filesOpenExternal:
    channel: filesOpenExternal
    input: FilesOpenExternalInput
    output: EmptyObject
  filesRevealInFinder:
    channel: filesRevealInFinder
    input: FilesRevealInFinderInput
    output: EmptyObject
  filesRipgrep:
    channel: filesRipgrep
    input: FilesRipgrepInput
    output: FilesRipgrepOutput
  sshListKeys:
    channel: sshListKeys
    input: EmptyObject
    output: SshListKeysOutput
  sshGenerateKey:
    channel: sshGenerateKey
    input: SshGenerateKeyInput
    output: SshGenerateKeyOutput
  cloneDiscardLocalChanges:
    channel: cloneDiscardLocalChanges
    input: CloneProjectIdInput
    output: CloneDiscardOutput
  cloneRevealInFinder:
    channel: cloneRevealInFinder
    input: CloneProjectIdInput
    output: EmptyObject
  cloneOpenInTerminal:
    channel: cloneOpenInTerminal
    input: CloneProjectIdInput
    output: EmptyObject
  cloneSetCapOverride:
    channel: cloneSetCapOverride
    input: CloneSetCapOverrideInput
    output: CloneSetCapOverrideOutput
  powerAcquire:
    channel: powerAcquire
    input: PowerAssertionAcquireInput
    output: PowerAssertionSnapshot
  powerRelease:
    channel: powerRelease
    input: PowerAssertionReleaseInput
    output: PowerAssertionSnapshot
  powerSnapshot:
    channel: powerSnapshot
    input: EmptyObject
    output: PowerAssertionSnapshot

# ── 4. Internal IPC command manifests (main-only) ──────────────────────────
#
# IpcRegistry hosts more than the renderer-facing channels — it also
# hosts internal command IDs (e.g., "mock-flywheel.health" wired in
# MockFlywheelClient.ts). The allowlist enforced on `register()` is
# the union of `preloadChannels` values + these exact command IDs.
#
# Keep these lists short. Each entry is a security review burden.
mockFlywheelCommands:
  health: mock-flywheel.health
  version: mock-flywheel.version
  capabilities: mock-flywheel.capabilities
  listProjects: mock-flywheel.projects.list
  getBeads: mock-flywheel.beads.get
  getTriage: mock-flywheel.triage.get
  getSwarmSnapshot: mock-flywheel.swarm.snapshot
  getMailDump: mock-flywheel.mail.dump
  getReservations: mock-flywheel.reservations.list
  getBuildLog: mock-flywheel.build-log.get
  getPaneLog: mock-flywheel.pane-log.get
  exchangePairingForBearer: mock-flywheel.auth.exchangePairing
  issueWsSession: mock-flywheel.auth.issue-ws-session
  scenarioInfo: mock-flywheel.scenario.info
  swapScenario: mock-flywheel.scenario.swap
  setReplaySpeed: mock-flywheel.replay.setSpeed

internalCommands:
  schemasSmokeProject: internal.schemas-smoke.project
  schemasSmokeCompatibility: internal.schemas-smoke.compatibility
  swarmSendMarchingOrders: internal.swarm-send-marching-orders
  approvalConfirm: internal.approval-confirm
  testAlways: internal.test.always
  testNeedsAuth: internal.test.needs-auth
  testDuplicate: internal.test.duplicate
  testGated: internal.test.gated
  testHealthy: internal.test.healthy
  testShadow: internal.test.shadow
  testUnregistered: internal.test.unregistered
  fuzzEcho: internal.fuzz-echo
