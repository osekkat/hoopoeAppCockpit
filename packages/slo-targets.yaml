schemaVersion: 1
# Single source of truth for §10.5 SLO targets. Plan, tests, and the
# Diagnostics SLO screen all read this file — never duplicate a number
# into a test or a dashboard. To assert against a target, call
# `expectSloPass(id, samples)` from `@hoopoe/slo`; the percentile is
# computed from the supplied sample array and compared against the
# declared target.
#
# Schema (per hp-5ja):
#   - id              stable target identifier (referenced from tests +
#                     Diagnostics + plan)
#   - description     one-line human description
#   - target          one of:
#                       {percentile: 95, value: "10s", direction: "max"}
#                       {boolean: true}
#   - source_section  authoritative plan.md anchor
#   - enforced_in     phases / suites this target gates
targets:
  - id: desktop.reconnect.p95
    description: Desktop reconnect after laptop wake, p95 after network returns
    target:
      percentile: 95
      value: 10s
      direction: max
    source_section: "§10.5"
    enforced_in: [phase2.e2e, chaos]

  - id: events.replay.10min.p95
    description: Snapshot-on-reconnect replay of 10 minutes of WS events, p95 across normal channels
    target:
      percentile: 95
      value: 5s
      direction: max
    source_section: "§10.5"
    enforced_in: [phase2.e2e]

  - id: activity.event.display.p95
    description: An emitted Activity event reaches the panel within budget, p95
    target:
      percentile: 95
      value: 1s
      direction: max
    source_section: "§10.5"
    enforced_in: [phase9.e2e]

  - id: terminal.attach.first-byte.p95
    description: Diagnostics terminal stream attach — first byte visible
    target:
      percentile: 95
      value: 2s
      direction: max
    source_section: "§10.5"
    enforced_in: [phase8.e2e]

  - id: file.open.cached.p95
    description: Cached file open in the desktop local clone, p95
    target:
      percentile: 95
      value: 150ms
      direction: max
    source_section: "§10.5"
    enforced_in: [phase4.e2e]

  - id: bead.kanban.load.1k.p95
    description: Kanban view loads 1,000 beads, p95
    target:
      percentile: 95
      value: 1s
      direction: max
    source_section: "§10.5"
    enforced_in: [phase7.e2e]

  - id: dag.usable.500-nodes
    description: DAG view is usable (scrollable + < 500ms layout) at 500 nodes
    target:
      boolean: true
    source_section: "§10.5"
    enforced_in: [phase7.e2e]

  - id: job.cancellation.no-orphans
    description: Cancelling a daemon job leaves no orphan child process groups
    target:
      boolean: true
    source_section: "§10.5"
    enforced_in: [phase2.e2e, chaos]
